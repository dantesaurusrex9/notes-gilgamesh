<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">
  <rect width="800" height="400" fill="#ffffff"/>

  <defs>
    <marker id="ah-axis" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="ah-purple" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="ah-bx" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb"/>
    </marker>
    <marker id="ah-rd" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ============== LEFT: STANDARD BASIS ============== -->
  <g>
    <text x="200" y="30" text-anchor="middle" fill="#333" font-weight="bold" font-size="15">Standard basis B = {e₁, e₂}</text>

    <!-- Faint grid -->
    <g stroke="#e0e0e0" stroke-width="1">
      <line x1="100" y1="60"  x2="100" y2="350"/>
      <line x1="150" y1="60"  x2="150" y2="350"/>
      <line x1="200" y1="60"  x2="200" y2="350"/>
      <line x1="250" y1="60"  x2="250" y2="350"/>
      <line x1="300" y1="60"  x2="300" y2="350"/>
      <line x1="350" y1="60"  x2="350" y2="350"/>
      <line x1="50" y1="100" x2="380" y2="100"/>
      <line x1="50" y1="150" x2="380" y2="150"/>
      <line x1="50" y1="200" x2="380" y2="200"/>
      <line x1="50" y1="250" x2="380" y2="250"/>
      <line x1="50" y1="300" x2="380" y2="300"/>
      <line x1="50" y1="60"  x2="380" y2="60"/>
    </g>

    <!-- Axes -->
    <line x1="50" y1="200" x2="380" y2="200" stroke="#333" stroke-width="2" marker-end="url(#ah-axis)"/>
    <line x1="200" y1="350" x2="200" y2="50"  stroke="#333" stroke-width="2" marker-end="url(#ah-axis)"/>

    <!-- e1, e2 -->
    <line x1="200" y1="200" x2="250" y2="200" stroke="#1f6feb" stroke-width="3" marker-end="url(#ah-bx)"/>
    <text x="218" y="218" fill="#1f6feb" font-weight="bold">e₁</text>
    <line x1="200" y1="200" x2="200" y2="150" stroke="#1f6feb" stroke-width="3" marker-end="url(#ah-bx)"/>
    <text x="180" y="178" fill="#1f6feb" font-weight="bold">e₂</text>

    <!-- v = (3, 1) → screen (350, 150) -->
    <line x1="200" y1="200" x2="350" y2="150" stroke="#7c3aed" stroke-width="3" marker-end="url(#ah-purple)"/>
    <text x="290" y="135" fill="#7c3aed" font-weight="bold">v</text>

    <!-- Origin -->
    <circle cx="200" cy="200" r="4" fill="#333"/>

    <!-- Coordinate readout -->
    <text x="200" y="380" text-anchor="middle" fill="#7c3aed" font-weight="bold" font-size="14">[v]_B = (3, 1)</text>
  </g>

  <!-- ============== RIGHT: ROTATED BASIS ============== -->
  <g transform="translate(400, 0)">
    <text x="200" y="30" text-anchor="middle" fill="#333" font-weight="bold" font-size="15">Rotated basis B' = {b'₁, b'₂}</text>

    <!-- Underlying standard grid (very faint) -->
    <g stroke="#e0e0e0" stroke-width="1">
      <line x1="100" y1="60"  x2="100" y2="350"/>
      <line x1="150" y1="60"  x2="150" y2="350"/>
      <line x1="200" y1="60"  x2="200" y2="350"/>
      <line x1="250" y1="60"  x2="250" y2="350"/>
      <line x1="300" y1="60"  x2="300" y2="350"/>
      <line x1="350" y1="60"  x2="350" y2="350"/>
      <line x1="50" y1="100" x2="380" y2="100"/>
      <line x1="50" y1="150" x2="380" y2="150"/>
      <line x1="50" y1="200" x2="380" y2="200"/>
      <line x1="50" y1="250" x2="380" y2="250"/>
      <line x1="50" y1="300" x2="380" y2="300"/>
      <line x1="50" y1="60"  x2="380" y2="60"/>
    </g>

    <!-- B' basis: b'1 = (1, 1) → (250, 150); b'2 = (-1, 1) → (150, 150). Orthogonal 45° rotation. -->
    <!-- Skewed grid lines aligned with B' (orange dashed) -->
    <!-- Line through origin in direction (1,1): screen direction (50, -50). From (200, 200) ± 4 steps: (0, 400)→(400, 0). -->
    <g stroke="#d97706" stroke-width="1" stroke-dasharray="3 3" stroke-opacity="0.5">
      <line x1="0"   y1="400" x2="400" y2="0"/>
      <line x1="-50" y1="350" x2="350" y2="-50"/>
      <line x1="50"  y1="450" x2="450" y2="50"/>
      <line x1="-100" y1="300" x2="300" y2="-100"/>
      <line x1="100" y1="500" x2="500" y2="100"/>
      <!-- Line through origin in direction (-1, 1): screen direction (-50, -50). From (200, 200): (400, 400)→(0, 0). -->
      <line x1="0"   y1="0"   x2="400" y2="400"/>
      <line x1="-50" y1="50"  x2="350" y2="450"/>
      <line x1="50"  y1="-50" x2="450" y2="350"/>
      <line x1="-100" y1="100" x2="300" y2="500"/>
      <line x1="100" y1="-100" x2="500" y2="300"/>
    </g>

    <!-- Axes (standard, faint) -->
    <line x1="50" y1="200" x2="380" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#ah-axis)"/>
    <line x1="200" y1="350" x2="200" y2="50"  stroke="#999" stroke-width="1.5" marker-end="url(#ah-axis)"/>

    <!-- b'1 = (1, 1) → (250, 150) -->
    <line x1="200" y1="200" x2="250" y2="150" stroke="#d97706" stroke-width="3" marker-end="url(#ah-rd)"/>
    <text x="258" y="148" fill="#d97706" font-weight="bold">b'₁</text>

    <!-- b'2 = (-1, 1) → (150, 150) -->
    <line x1="200" y1="200" x2="150" y2="150" stroke="#d97706" stroke-width="3" marker-end="url(#ah-rd)"/>
    <text x="125" y="148" fill="#d97706" font-weight="bold">b'₂</text>

    <!-- The same vector v = (3, 1) in standard coords. In B' it expands as 2 b'1 + (-1) b'2 = 2*(1,1) + (-1)*(-1,1) = (2+1, 2-1) = (3, 1). ✓ -->
    <line x1="200" y1="200" x2="350" y2="150" stroke="#7c3aed" stroke-width="3" marker-end="url(#ah-purple)"/>
    <text x="290" y="135" fill="#7c3aed" font-weight="bold">v</text>

    <!-- Show decomposition: 2 b'1 lands at (300, 100); subtract b'2 to land at (350, 150). -->
    <line x1="200" y1="200" x2="300" y2="100" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 2" stroke-opacity="0.7"/>
    <line x1="300" y1="100" x2="350" y2="150" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3 2" stroke-opacity="0.7"/>
    <text x="265" y="120" fill="#d97706" font-size="11">2 b'₁</text>
    <text x="335" y="125" fill="#d97706" font-size="11">−b'₂</text>

    <!-- Origin -->
    <circle cx="200" cy="200" r="4" fill="#333"/>

    <text x="200" y="380" text-anchor="middle" fill="#7c3aed" font-weight="bold" font-size="14">[v]_B' = (2, −1)</text>
  </g>
</svg>
