<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">
  <rect width="800" height="400" fill="#ffffff"/>

  <defs>
    <marker id="ah-axis" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="ah-bx" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb"/>
    </marker>
    <marker id="ah-rd" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ============== LEFT: BEFORE ============== -->
  <g>
    <text x="200" y="30" text-anchor="middle" fill="#333" font-weight="bold" font-size="15">Before — standard grid in ℝ²</text>

    <!-- Standard rectangular grid -->
    <g stroke="#cbd5e1" stroke-width="1">
      <!-- Vertical lines at x = -3..3 (origin = 200) -->
      <line x1="50"  y1="60" x2="50"  y2="350"/>
      <line x1="100" y1="60" x2="100" y2="350"/>
      <line x1="150" y1="60" x2="150" y2="350"/>
      <line x1="200" y1="60" x2="200" y2="350"/>
      <line x1="250" y1="60" x2="250" y2="350"/>
      <line x1="300" y1="60" x2="300" y2="350"/>
      <line x1="350" y1="60" x2="350" y2="350"/>
      <!-- Horizontal lines at y = -3..3 -->
      <line x1="50" y1="60"  x2="350" y2="60"/>
      <line x1="50" y1="110" x2="350" y2="110"/>
      <line x1="50" y1="160" x2="350" y2="160"/>
      <line x1="50" y1="210" x2="350" y2="210"/>
      <line x1="50" y1="260" x2="350" y2="260"/>
      <line x1="50" y1="310" x2="350" y2="310"/>
    </g>

    <!-- Highlight unit square -->
    <polygon points="200,210 250,210 250,160 200,160" fill="#1f6feb" fill-opacity="0.15" stroke="#1f6feb" stroke-width="2"/>

    <!-- Axes -->
    <line x1="40" y1="210" x2="360" y2="210" stroke="#333" stroke-width="2" marker-end="url(#ah-axis)"/>
    <line x1="200" y1="360" x2="200" y2="50"  stroke="#333" stroke-width="2" marker-end="url(#ah-axis)"/>

    <!-- e1 -->
    <line x1="200" y1="210" x2="250" y2="210" stroke="#1f6feb" stroke-width="3" marker-end="url(#ah-bx)"/>
    <text x="220" y="200" fill="#1f6feb" font-weight="bold">e₁</text>

    <!-- e2 -->
    <line x1="200" y1="210" x2="200" y2="160" stroke="#1f6feb" stroke-width="3" marker-end="url(#ah-bx)"/>
    <text x="208" y="180" fill="#1f6feb" font-weight="bold">e₂</text>

    <text x="200" y="385" text-anchor="middle" fill="#555" font-size="12">straight lines, right-angled grid, unit square</text>
  </g>

  <!-- ============== ARROW ============== -->
  <g>
    <text x="400" y="195" text-anchor="middle" fill="#333" font-weight="bold" font-size="20">T</text>
    <line x1="380" y1="210" x2="420" y2="210" stroke="#333" stroke-width="2.5" marker-end="url(#ah-axis)"/>
    <text x="400" y="232" text-anchor="middle" fill="#555" font-size="11">linear map</text>
  </g>

  <!-- ============== RIGHT: AFTER ============== -->
  <!-- T = rotation by 30° plus scaling [[cos30 * 1.4, -sin30], [sin30, cos30 * 1.4]] = roughly
       [[1.21, -0.5], [0.7, 0.85]] -->
  <!-- For simplicity, use a clear "rotation 30° + slight stretch" matrix
       cos30 ≈ 0.866, sin30 = 0.5.
       Apply T(x, y) = (0.866 x - 0.5 y, 0.5 x + 0.866 y)
       Grid spacing = 50 px, so e1 (1, 0) → (0.866, 0.5) → screen offset (43, -25)
       e2 (0, 1) → (-0.5, 0.866) → screen offset (-25, -43) -->
  <g transform="translate(400, 0)">
    <text x="200" y="30" text-anchor="middle" fill="#333" font-weight="bold" font-size="15">After T = 30° rotation</text>

    <!-- Skewed grid: lines parallel to T(e1) and T(e2) through grid points -->
    <!-- T(e1) direction: (43, -25)px ; T(e2) direction: (-25, -43)px -->
    <g stroke="#fde68a" stroke-width="1">
      <!-- Lines parallel to T(e1) through integer multiples of T(e2) -->
      <!-- For each k in -3..3, line from (200 + k*(-25) - 4*43, 210 + k*(-43) - 4*(-25)) to (... + 4*... in T(e1) dir) -->
      <!-- Generating positions ahead of time. -->
      <!-- k=-3: anchor (200+75, 210+129) = (275, 339). Going ± 4 units of T(e1): ±(172, -100). Start (103, 439) end (447, 239) -->
      <line x1="103" y1="439" x2="447" y2="239"/>
      <!-- k=-2: anchor (200+50, 210+86) = (250, 296). ± (172, -100). (78, 396) (422, 196) -->
      <line x1="78"  y1="396" x2="422" y2="196"/>
      <!-- k=-1: (225, 253). (53, 353) (397, 153) -->
      <line x1="53"  y1="353" x2="397" y2="153"/>
      <!-- k=0: (200, 210). (28, 310) (372, 110) -->
      <line x1="28"  y1="310" x2="372" y2="110"/>
      <!-- k=1: (175, 167). (3, 267) (347, 67) -->
      <line x1="3"   y1="267" x2="347" y2="67"/>
      <!-- k=2: (150, 124). (-22, 224) (322, 24) -->
      <line x1="-22" y1="224" x2="322" y2="24"/>
      <!-- k=3: (125, 81). (-47, 181) (297, -19) -->
      <line x1="-47" y1="181" x2="297" y2="-19"/>

      <!-- Lines parallel to T(e2) through multiples of T(e1) -->
      <!-- k=-3: anchor (200 - 129, 210 + 75) = (71, 285). Going ± 4 units of T(e2): ±(-100, -172). (171, 457) (-29, 113) -->
      <line x1="171" y1="457" x2="-29" y2="113"/>
      <!-- k=-2: (114, 260). (214, 432) (14, 88) -->
      <line x1="214" y1="432" x2="14"  y2="88"/>
      <!-- k=-1: (157, 235). (257, 407) (57, 63) -->
      <line x1="257" y1="407" x2="57"  y2="63"/>
      <!-- k=0: (200, 210). (300, 382) (100, 38) -->
      <line x1="300" y1="382" x2="100" y2="38"/>
      <!-- k=1: (243, 185). (343, 357) (143, 13) -->
      <line x1="343" y1="357" x2="143" y2="13"/>
      <!-- k=2: (286, 160). (386, 332) (186, -12) -->
      <line x1="386" y1="332" x2="186" y2="-12"/>
      <!-- k=3: (329, 135). (429, 307) (229, -37) -->
      <line x1="429" y1="307" x2="229" y2="-37"/>
    </g>

    <!-- Transformed unit square: corners (0,0), T(e1)=(0.866, 0.5)*50=(43, -25), T(e1+e2) = (43-25, -25-43)=(18, -68), T(e2) = (-25, -43). All offsets from origin (200, 210). -->
    <polygon points="200,210 243,185 218,142 175,167" fill="#d97706" fill-opacity="0.18" stroke="#d97706" stroke-width="2"/>

    <!-- Axes -->
    <line x1="40" y1="210" x2="360" y2="210" stroke="#333" stroke-width="2" marker-end="url(#ah-axis)"/>
    <line x1="200" y1="360" x2="200" y2="50"  stroke="#333" stroke-width="2" marker-end="url(#ah-axis)"/>

    <!-- T(e1) -->
    <line x1="200" y1="210" x2="243" y2="185" stroke="#d97706" stroke-width="3" marker-end="url(#ah-rd)"/>
    <text x="248" y="183" fill="#d97706" font-weight="bold">T(e₁)</text>

    <!-- T(e2) -->
    <line x1="200" y1="210" x2="175" y2="167" stroke="#d97706" stroke-width="3" marker-end="url(#ah-rd)"/>
    <text x="135" y="160" fill="#d97706" font-weight="bold">T(e₂)</text>

    <text x="200" y="385" text-anchor="middle" fill="#555" font-size="12">grid stays straight, just rotates and tilts together</text>
  </g>
</svg>
