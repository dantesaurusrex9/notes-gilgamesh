<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">
  <!-- Background -->
  <rect width="400" height="400" fill="#ffffff"/>

  <!-- Grid lines (every 50px = 1 unit, scale: 1 unit = 50px) -->
  <!-- Origin at (50, 350); x increases right, y increases up -->
  <g stroke="#e0e0e0" stroke-width="1">
    <!-- Vertical grid lines at x = 1..6 -->
    <line x1="100" y1="50"  x2="100" y2="350"/>
    <line x1="150" y1="50"  x2="150" y2="350"/>
    <line x1="200" y1="50"  x2="200" y2="350"/>
    <line x1="250" y1="50"  x2="250" y2="350"/>
    <line x1="300" y1="50"  x2="300" y2="350"/>
    <line x1="350" y1="50"  x2="350" y2="350"/>
    <!-- Horizontal grid lines at y = 1..6 -->
    <line x1="50"  y1="300" x2="380" y2="300"/>
    <line x1="50"  y1="250" x2="380" y2="250"/>
    <line x1="50"  y1="200" x2="380" y2="200"/>
    <line x1="50"  y1="150" x2="380" y2="150"/>
    <line x1="50"  y1="100" x2="380" y2="100"/>
    <line x1="50"  y1="50"  x2="380" y2="50"/>
  </g>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="ah-axis" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="ah-vec" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f6feb"/>
    </marker>
  </defs>

  <!-- Axes -->
  <line x1="50" y1="350" x2="380" y2="350" stroke="#333" stroke-width="2"
        marker-end="url(#ah-axis)"/>
  <line x1="50" y1="350" x2="50"  y2="20"  stroke="#333" stroke-width="2"
        marker-end="url(#ah-axis)"/>

  <!-- Axis labels -->
  <text x="388" y="355" font-style="italic" fill="#333">x</text>
  <text x="38"  y="20"  font-style="italic" fill="#333">y</text>

  <!-- Axis tick numbers -->
  <g fill="#555">
    <text x="46"  y="368" text-anchor="middle">0</text>
    <text x="100" y="368" text-anchor="middle">1</text>
    <text x="150" y="368" text-anchor="middle">2</text>
    <text x="200" y="368" text-anchor="middle">3</text>
    <text x="250" y="368" text-anchor="middle">4</text>
    <text x="300" y="368" text-anchor="middle">5</text>
    <text x="350" y="368" text-anchor="middle">6</text>
    <text x="40"  y="304" text-anchor="end">1</text>
    <text x="40"  y="254" text-anchor="end">2</text>
    <text x="40"  y="204" text-anchor="end">3</text>
    <text x="40"  y="154" text-anchor="end">4</text>
    <text x="40"  y="104" text-anchor="end">5</text>
    <text x="40"  y="54"  text-anchor="end">6</text>
  </g>

  <!-- The vector v = (3, 2) — arrow from (50, 350) to (200, 250) -->
  <line x1="50" y1="350" x2="200" y2="250"
        stroke="#1f6feb" stroke-width="3"
        marker-end="url(#ah-vec)"/>

  <!-- Tail dot -->
  <circle cx="50" cy="350" r="4" fill="#1f6feb"/>

  <!-- Head dot -->
  <circle cx="200" cy="250" r="4" fill="#1f6feb"/>

  <!-- Vector label -->
  <text x="120" y="290" fill="#1f6feb" font-weight="bold" font-size="16">v = (3, 2)</text>

  <!-- Component decomposition (dashed) -->
  <g stroke="#888" stroke-width="1.5" stroke-dasharray="4 3">
    <line x1="50"  y1="350" x2="200" y2="350"/>
    <line x1="200" y1="350" x2="200" y2="250"/>
  </g>

  <!-- Component labels -->
  <text x="125" y="345" fill="#555" font-style="italic">x-component = 3</text>
  <text x="206" y="306" fill="#555" font-style="italic">y-component = 2</text>

  <!-- Origin label -->
  <text x="36" y="365" fill="#555" font-style="italic">O</text>
</svg>
