<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Foundation model design map</title>
  <desc id="desc">A linear map from training data through architecture, scale, post-training, sampling, and application behavior.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 14; }
      .h { font: 700 19px Arial, sans-serif; fill: #111827; }
      .b { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720" />
  <text class="title" x="64" y="72">Foundation Model Design Choices</text>
  <text class="subtitle" x="64" y="104">Chapter 2: each upstream choice changes downstream application behavior.</text>
  <rect class="box" x="70" y="190" width="185" height="170" fill="#dbeafe" />
  <text class="h" x="96" y="235">Training data</text>
  <text class="b" x="96" y="270">Coverage, quality,</text>
  <text class="b" x="96" y="292">language, domain,</text>
  <text class="b" x="96" y="314">contamination.</text>
  <path class="arrow" d="M262 275 L322 275" />
  <rect class="box" x="330" y="190" width="185" height="170" fill="#dcfce7" />
  <text class="h" x="356" y="235">Architecture</text>
  <text class="b" x="356" y="270">Transformer,</text>
  <text class="b" x="356" y="292">attention, MoE,</text>
  <text class="b" x="356" y="314">long-context design.</text>
  <path class="arrow" d="M522 275 L582 275" />
  <rect class="box" x="590" y="190" width="185" height="170" fill="#fef3c7" />
  <text class="h" x="616" y="235">Scale</text>
  <text class="b" x="616" y="270">Parameters, tokens,</text>
  <text class="b" x="616" y="292">compute budget,</text>
  <text class="b" x="616" y="314">scaling laws.</text>
  <path class="arrow" d="M782 275 L842 275" />
  <rect class="box" x="850" y="190" width="185" height="170" fill="#ede9fe" />
  <text class="h" x="876" y="235">Post-training</text>
  <text class="b" x="876" y="270">SFT, preference</text>
  <text class="b" x="876" y="292">data, RLHF,</text>
  <text class="b" x="876" y="314">alignment.</text>
  <path class="arrow" d="M1042 275 L1102 275" />
  <rect class="box" x="1110" y="190" width="130" height="170" fill="#fee2e2" />
  <text class="h" x="1130" y="235">Sampling</text>
  <text class="b" x="1130" y="270">Logits,</text>
  <text class="b" x="1130" y="292">temperature,</text>
  <text class="b" x="1130" y="314">top-p.</text>
  <rect class="box" x="250" y="470" width="780" height="95" fill="#ffffff" />
  <text class="h" x="290" y="512">Application question</text>
  <text class="b" x="290" y="542">Does this model's data, architecture, scale, alignment, and sampling setup fit the product's quality, latency, cost, and safety requirements?</text>
</svg>
