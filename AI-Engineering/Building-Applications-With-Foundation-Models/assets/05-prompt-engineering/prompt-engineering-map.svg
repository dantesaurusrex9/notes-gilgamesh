<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Prompt engineering workflow</title>
  <desc id="desc">A workflow from prompt template to evaluation, versioning, and defensive controls.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 14; }
      .h { font: 700 19px Arial, sans-serif; fill: #111827; }
      .b { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720" />
  <text class="title" x="64" y="72">Prompt Engineering</text>
  <text class="subtitle" x="64" y="104">Chapter 5: make model instructions clear, testable, versioned, and defensible.</text>
  <rect class="box" x="90" y="185" width="220" height="135" fill="#dbeafe" />
  <text class="h" x="120" y="230">Template</text>
  <text class="b" x="120" y="262">Role, task, context,</text>
  <text class="b" x="120" y="284">examples, schema.</text>
  <path class="arrow" d="M320 252 L390 252" />
  <rect class="box" x="400" y="185" width="220" height="135" fill="#dcfce7" />
  <text class="h" x="430" y="230">Evaluate</text>
  <text class="b" x="430" y="262">Run prompt evals,</text>
  <text class="b" x="430" y="284">compare variants.</text>
  <path class="arrow" d="M630 252 L700 252" />
  <rect class="box" x="710" y="185" width="220" height="135" fill="#fef3c7" />
  <text class="h" x="740" y="230">Version</text>
  <text class="b" x="740" y="262">Track prompt, model,</text>
  <text class="b" x="740" y="284">settings, results.</text>
  <path class="arrow" d="M940 252 L1010 252" />
  <rect class="box" x="1020" y="185" width="190" height="135" fill="#fee2e2" />
  <text class="h" x="1050" y="230">Defend</text>
  <text class="b" x="1050" y="262">Injection, leaks,</text>
  <text class="b" x="1050" y="284">unsafe actions.</text>
  <rect class="box" x="270" y="460" width="740" height="95" fill="#ffffff" />
  <text class="h" x="310" y="502">Production rule</text>
  <text class="b" x="310" y="532">A prompt is production code for model behavior: test it, version it, and protect it.</text>
</svg>
