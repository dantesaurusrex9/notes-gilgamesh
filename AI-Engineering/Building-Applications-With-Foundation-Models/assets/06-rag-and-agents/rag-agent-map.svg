<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">RAG and agent context construction map</title>
  <desc id="desc">A map showing user query, retrieval, context, generation, tools, actions, and observations.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 14; }
      .h { font: 700 19px Arial, sans-serif; fill: #111827; }
      .b { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
      .tool { stroke: #7c3aed; stroke-width: 3; marker-end: url(#purpleArrow); fill: none; stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
    <marker id="purpleArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760" />
  <text class="title" x="64" y="72">RAG and Agents</text>
  <text class="subtitle" x="64" y="104">Chapter 6: construct the right context, then add tools only when needed.</text>
  <rect class="box" x="90" y="190" width="180" height="120" fill="#dbeafe" />
  <text class="h" x="120" y="235">Query</text>
  <text class="b" x="120" y="267">User task</text>
  <path class="arrow" d="M280 250 L350 250" />
  <rect class="box" x="360" y="190" width="210" height="120" fill="#dcfce7" />
  <text class="h" x="390" y="235">Retriever</text>
  <text class="b" x="390" y="267">BM25, vector, hybrid</text>
  <path class="arrow" d="M580 250 L650 250" />
  <rect class="box" x="660" y="190" width="210" height="120" fill="#fef3c7" />
  <text class="h" x="690" y="235">Context</text>
  <text class="b" x="690" y="267">Chunks, tables, media</text>
  <path class="arrow" d="M880 250 L950 250" />
  <rect class="box" x="960" y="190" width="220" height="120" fill="#ede9fe" />
  <text class="h" x="990" y="235">Generator</text>
  <text class="b" x="990" y="267">Grounded response</text>
  <rect class="box" x="360" y="475" width="220" height="120" fill="#ffffff" />
  <text class="h" x="390" y="520">Tools</text>
  <text class="b" x="390" y="552">Search, SQL, APIs, code</text>
  <rect class="box" x="700" y="475" width="220" height="120" fill="#fee2e2" />
  <text class="h" x="730" y="520">Actions</text>
  <text class="b" x="730" y="552">Read, draft, write</text>
  <path class="tool" d="M1070 315 C1000 450 900 520 930 535" />
  <path class="tool" d="M700 535 L590 535" />
  <path class="tool" d="M470 475 C430 390 505 330 660 300" />
</svg>
