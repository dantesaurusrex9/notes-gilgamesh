<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AI architecture and feedback loop</title>
  <desc id="desc">An AI application architecture map from query to context, guardrails, gateway, model, cache, observability, and feedback.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 14; }
      .h { font: 700 19px Arial, sans-serif; fill: #111827; }
      .b { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
      .loop { stroke: #7c3aed; stroke-width: 3; marker-end: url(#purpleArrow); fill: none; stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
    <marker id="purpleArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760" />
  <text class="title" x="64" y="72">Architecture and User Feedback</text>
  <text class="subtitle" x="64" y="104">Chapter 10: production architecture grows from failure modes, and feedback improves the loop.</text>
  <rect class="box" x="70" y="185" width="150" height="115" fill="#dbeafe" />
  <text class="h" x="98" y="230">Query</text>
  <text class="b" x="98" y="262">User task</text>
  <path class="arrow" d="M230 242 L290 242" />
  <rect class="box" x="300" y="185" width="175" height="115" fill="#dcfce7" />
  <text class="h" x="328" y="230">Context</text>
  <text class="b" x="328" y="262">RAG and tools</text>
  <path class="arrow" d="M485 242 L545 242" />
  <rect class="box" x="555" y="185" width="175" height="115" fill="#fef3c7" />
  <text class="h" x="583" y="230">Guardrails</text>
  <text class="b" x="583" y="262">Input/output</text>
  <path class="arrow" d="M740 242 L800 242" />
  <rect class="box" x="810" y="185" width="175" height="115" fill="#ede9fe" />
  <text class="h" x="838" y="230">Gateway</text>
  <text class="b" x="838" y="262">Route, log, limit</text>
  <path class="arrow" d="M995 242 L1055 242" />
  <rect class="box" x="1065" y="185" width="150" height="115" fill="#fee2e2" />
  <text class="h" x="1093" y="230">Model</text>
  <text class="b" x="1093" y="262">Generate</text>
  <rect class="box" x="260" y="475" width="210" height="115" fill="#ffffff" />
  <text class="h" x="290" y="520">Observability</text>
  <text class="b" x="290" y="552">Metrics, logs, traces</text>
  <rect class="box" x="545" y="475" width="190" height="115" fill="#ffffff" />
  <text class="h" x="575" y="520">Feedback</text>
  <text class="b" x="575" y="552">Explicit and implicit</text>
  <rect class="box" x="810" y="475" width="190" height="115" fill="#ffffff" />
  <text class="h" x="840" y="520">Improve</text>
  <text class="b" x="840" y="552">Prompt, data, evals</text>
  <path class="loop" d="M1140 305 C1110 450 1040 525 1010 532" />
  <path class="loop" d="M810 532 L745 532" />
  <path class="loop" d="M545 532 L480 532" />
  <path class="loop" d="M365 475 C295 395 310 325 390 300" />
</svg>
