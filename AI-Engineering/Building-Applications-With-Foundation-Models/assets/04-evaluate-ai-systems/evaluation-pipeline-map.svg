<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Evaluation-driven AI system workflow</title>
  <desc id="desc">A loop from criteria to model selection, build versus buy, pipeline evaluation, and production regression tests.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 14; }
      .h { font: 700 19px Arial, sans-serif; fill: #111827; }
      .b { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
      .loop { stroke: #7c3aed; stroke-width: 3; marker-end: url(#purpleArrow); fill: none; stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
    <marker id="purpleArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760" />
  <text class="title" x="64" y="72">Evaluate AI Systems</text>
  <text class="subtitle" x="64" y="104">Chapter 4: criteria before model choice, pipeline before launch.</text>
  <rect class="box" x="90" y="180" width="220" height="125" fill="#dbeafe" />
  <text class="h" x="120" y="225">Criteria</text>
  <text class="b" x="120" y="258">Quality, safety,</text>
  <text class="b" x="120" y="280">latency, cost.</text>
  <path class="arrow" d="M320 242 L390 242" />
  <rect class="box" x="400" y="180" width="220" height="125" fill="#dcfce7" />
  <text class="h" x="430" y="225">Model selection</text>
  <text class="b" x="430" y="258">Hard filters,</text>
  <text class="b" x="430" y="280">task evals.</text>
  <path class="arrow" d="M630 242 L700 242" />
  <rect class="box" x="710" y="180" width="220" height="125" fill="#fef3c7" />
  <text class="h" x="740" y="225">Build or buy</text>
  <text class="b" x="740" y="258">API, managed,</text>
  <text class="b" x="740" y="280">self-host, train.</text>
  <path class="arrow" d="M940 242 L1010 242" />
  <rect class="box" x="1020" y="180" width="200" height="125" fill="#ede9fe" />
  <text class="h" x="1050" y="225">Pipeline</text>
  <text class="b" x="1050" y="258">Components and</text>
  <text class="b" x="1050" y="280">end-to-end gates.</text>
  <rect class="box" x="400" y="465" width="480" height="110" fill="#ffffff" />
  <text class="h" x="440" y="512">Production learning</text>
  <text class="b" x="440" y="542">Failures become examples, examples become regression tests,</text>
  <text class="b" x="440" y="564">and regression tests guide the next change.</text>
  <path class="loop" d="M1120 315 C1080 455 940 545 890 535" />
  <path class="loop" d="M390 535 C220 520 150 405 185 315" />
</svg>
