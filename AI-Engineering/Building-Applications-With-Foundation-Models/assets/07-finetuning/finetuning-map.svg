<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Finetuning decision and memory map</title>
  <desc id="desc">A map from adaptation decision through full finetuning, PEFT, LoRA, QLoRA, memory bottlenecks, and evaluation.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 14; }
      .h { font: 700 19px Arial, sans-serif; fill: #111827; }
      .b { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760" />
  <text class="title" x="64" y="72">Finetuning</text>
  <text class="subtitle" x="64" y="104">Chapter 7: change model weights only when the behavior gap justifies the data and memory cost.</text>
  <rect class="box" x="80" y="190" width="210" height="125" fill="#dbeafe" />
  <text class="h" x="110" y="235">Decision</text>
  <text class="b" x="110" y="267">RAG, prompt, switch,</text>
  <text class="b" x="110" y="289">or finetune?</text>
  <path class="arrow" d="M300 252 L370 252" />
  <rect class="box" x="380" y="190" width="210" height="125" fill="#dcfce7" />
  <text class="h" x="410" y="235">Memory</text>
  <text class="b" x="410" y="267">Weights, gradients,</text>
  <text class="b" x="410" y="289">optimizer, activations.</text>
  <path class="arrow" d="M600 252 L670 252" />
  <rect class="box" x="680" y="190" width="210" height="125" fill="#fef3c7" />
  <text class="h" x="710" y="235">PEFT</text>
  <text class="b" x="710" y="267">Train fewer</text>
  <text class="b" x="710" y="289">parameters.</text>
  <path class="arrow" d="M900 252 L970 252" />
  <rect class="box" x="980" y="190" width="220" height="125" fill="#ede9fe" />
  <text class="h" x="1010" y="235">Adapters</text>
  <text class="b" x="1010" y="267">LoRA, QLoRA,</text>
  <text class="b" x="1010" y="289">multi-LoRA.</text>
  <rect class="box" x="300" y="470" width="680" height="110" fill="#ffffff" />
  <text class="h" x="340" y="515">Evaluation rule</text>
  <text class="b" x="340" y="545">Finetuning is successful only if it beats prompt, RAG, or model-switch baselines on task-specific evals.</text>
</svg>
