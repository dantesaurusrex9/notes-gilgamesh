<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Inference optimization bottleneck map</title>
  <desc id="desc">A map linking metrics, bottlenecks, model optimization, hardware, KV cache, and service optimization.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 14; }
      .h { font: 700 19px Arial, sans-serif; fill: #111827; }
      .b { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760" />
  <text class="title" x="64" y="72">Inference Optimization</text>
  <text class="subtitle" x="64" y="104">Chapter 9: find the bottleneck before choosing the optimization.</text>
  <rect class="box" x="80" y="185" width="210" height="125" fill="#dbeafe" />
  <text class="h" x="110" y="230">Measure</text>
  <text class="b" x="110" y="262">TTFT, TPOT,</text>
  <text class="b" x="110" y="284">goodput, cost.</text>
  <path class="arrow" d="M300 247 L370 247" />
  <rect class="box" x="380" y="185" width="210" height="125" fill="#dcfce7" />
  <text class="h" x="410" y="230">Bottleneck</text>
  <text class="b" x="410" y="262">Compute, memory,</text>
  <text class="b" x="410" y="284">queue, network.</text>
  <path class="arrow" d="M590 247 L660 247" />
  <rect class="box" x="670" y="185" width="210" height="125" fill="#fef3c7" />
  <text class="h" x="700" y="230">Optimize</text>
  <text class="b" x="700" y="262">Compression, KV,</text>
  <text class="b" x="700" y="284">kernels, batching.</text>
  <path class="arrow" d="M880 247 L950 247" />
  <rect class="box" x="960" y="185" width="220" height="125" fill="#ede9fe" />
  <text class="h" x="990" y="230">Re-evaluate</text>
  <text class="b" x="990" y="262">Quality, latency,</text>
  <text class="b" x="990" y="284">cost, stability.</text>
  <rect class="box" x="280" y="470" width="720" height="105" fill="#ffffff" />
  <text class="h" x="320" y="514">Optimization rule</text>
  <text class="b" x="320" y="544">Every speed or cost win must be checked against quality and reliability.</text>
</svg>
