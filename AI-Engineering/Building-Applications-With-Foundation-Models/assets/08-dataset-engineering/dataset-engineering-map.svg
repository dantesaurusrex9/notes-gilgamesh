<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Dataset engineering lifecycle</title>
  <desc id="desc">A lifecycle diagram from curation through annotation, synthesis, processing, lineage, and evaluation.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .box { stroke: #0f172a; stroke-width: 2; rx: 14; }
      .h { font: 700 19px Arial, sans-serif; fill: #111827; }
      .b { font: 400 15px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760" />
  <text class="title" x="64" y="72">Dataset Engineering</text>
  <text class="subtitle" x="64" y="104">Chapter 8: data quality, coverage, lineage, and processing become model behavior.</text>
  <rect class="box" x="70" y="190" width="180" height="120" fill="#dbeafe" />
  <text class="h" x="100" y="235">Curate</text>
  <text class="b" x="100" y="267">Task, users,</text>
  <text class="b" x="100" y="289">coverage.</text>
  <path class="arrow" d="M260 250 L330 250" />
  <rect class="box" x="340" y="190" width="180" height="120" fill="#dcfce7" />
  <text class="h" x="370" y="235">Annotate</text>
  <text class="b" x="370" y="267">Guidelines,</text>
  <text class="b" x="370" y="289">calibration.</text>
  <path class="arrow" d="M530 250 L600 250" />
  <rect class="box" x="610" y="190" width="180" height="120" fill="#fef3c7" />
  <text class="h" x="640" y="235">Synthesize</text>
  <text class="b" x="640" y="267">Augment, generate,</text>
  <text class="b" x="640" y="289">distill.</text>
  <path class="arrow" d="M800 250 L870 250" />
  <rect class="box" x="880" y="190" width="180" height="120" fill="#ede9fe" />
  <text class="h" x="910" y="235">Process</text>
  <text class="b" x="910" y="267">Inspect, dedupe,</text>
  <text class="b" x="910" y="289">filter.</text>
  <path class="arrow" d="M1070 250 L1130 250" />
  <rect class="box" x="1135" y="190" width="120" height="120" fill="#fee2e2" />
  <text class="h" x="1155" y="235">Lineage</text>
  <text class="b" x="1155" y="267">Source,</text>
  <text class="b" x="1155" y="289">license.</text>
  <rect class="box" x="270" y="470" width="740" height="105" fill="#ffffff" />
  <text class="h" x="310" y="514">Training rule</text>
  <text class="b" x="310" y="544">Only train on data whose quality, coverage, compliance, and lineage you can explain.</text>
</svg>
