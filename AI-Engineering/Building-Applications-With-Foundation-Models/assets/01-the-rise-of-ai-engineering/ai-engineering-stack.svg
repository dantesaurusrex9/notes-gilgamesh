<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Three-layer AI engineering stack</title>
  <desc id="desc">A layered map of application development, model development, and infrastructure with evaluation and feedback loops.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .layer { stroke: #0f172a; stroke-width: 2; rx: 16; }
      .label { font: 700 22px Arial, sans-serif; fill: #111827; }
      .body { font: 400 16px Arial, sans-serif; fill: #334155; }
      .small { font: 400 14px Arial, sans-serif; fill: #475569; }
      .chip { stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
      .feedback { stroke: #7c3aed; stroke-width: 3; marker-end: url(#purpleArrow); fill: none; stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
    <marker id="purpleArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed" />
    </marker>
  </defs>

  <rect class="bg" width="1280" height="820" />
  <text class="title" x="64" y="70">AI Engineering Stack</text>
  <text class="subtitle" x="64" y="103">Start at the product layer, then move downward only when evidence says prompts and context are not enough.</text>

  <rect class="layer" x="96" y="150" width="1088" height="155" fill="#dbeafe" />
  <text class="label" x="132" y="195">1. Application development</text>
  <text class="body" x="132" y="230">Owns the user workflow, prompts, context, retrieval, tool use, guardrails, UI, and feedback.</text>
  <rect class="chip" x="132" y="252" width="160" height="34" fill="#eff6ff" />
  <text class="small" x="154" y="275">evaluation</text>
  <rect class="chip" x="312" y="252" width="160" height="34" fill="#eff6ff" />
  <text class="small" x="334" y="275">prompting</text>
  <rect class="chip" x="492" y="252" width="160" height="34" fill="#eff6ff" />
  <text class="small" x="514" y="275">RAG</text>
  <rect class="chip" x="672" y="252" width="160" height="34" fill="#eff6ff" />
  <text class="small" x="694" y="275">agents</text>
  <rect class="chip" x="852" y="252" width="210" height="34" fill="#eff6ff" />
  <text class="small" x="874" y="275">product interface</text>

  <path class="arrow" d="M640 309 L640 354" />

  <rect class="layer" x="96" y="360" width="1088" height="155" fill="#dcfce7" />
  <text class="label" x="132" y="405">2. Model development</text>
  <text class="body" x="132" y="440">Owns model adaptation, data curation, finetuning, post-training, and inference optimization.</text>
  <rect class="chip" x="132" y="462" width="160" height="34" fill="#f0fdf4" />
  <text class="small" x="154" y="485">finetuning</text>
  <rect class="chip" x="312" y="462" width="190" height="34" fill="#f0fdf4" />
  <text class="small" x="334" y="485">dataset engineering</text>
  <rect class="chip" x="522" y="462" width="190" height="34" fill="#f0fdf4" />
  <text class="small" x="544" y="485">quantization</text>
  <rect class="chip" x="732" y="462" width="190" height="34" fill="#f0fdf4" />
  <text class="small" x="754" y="485">distillation</text>
  <rect class="chip" x="942" y="462" width="170" height="34" fill="#f0fdf4" />
  <text class="small" x="964" y="485">benchmarks</text>

  <path class="arrow" d="M640 519 L640 564" />

  <rect class="layer" x="96" y="570" width="1088" height="155" fill="#fef3c7" />
  <text class="label" x="132" y="615">3. Infrastructure</text>
  <text class="body" x="132" y="650">Owns serving, compute, storage, vector search, monitoring, traces, queues, and deployment controls.</text>
  <rect class="chip" x="132" y="672" width="160" height="34" fill="#fffbeb" />
  <text class="small" x="154" y="695">serving</text>
  <rect class="chip" x="312" y="672" width="160" height="34" fill="#fffbeb" />
  <text class="small" x="334" y="695">GPUs</text>
  <rect class="chip" x="492" y="672" width="180" height="34" fill="#fffbeb" />
  <text class="small" x="514" y="695">monitoring</text>
  <rect class="chip" x="692" y="672" width="190" height="34" fill="#fffbeb" />
  <text class="small" x="714" y="695">vector stores</text>
  <rect class="chip" x="902" y="672" width="210" height="34" fill="#fffbeb" />
  <text class="small" x="924" y="695">cost controls</text>

  <path class="feedback" d="M1198 652 C1240 500 1240 245 1198 224" />
  <text class="small" x="790" y="775">Production feedback updates evals, prompts, retrieval, data, model choice, and infrastructure.</text>
</svg>
