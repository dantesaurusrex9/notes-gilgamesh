<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AI application planning loop</title>
  <desc id="desc">A loop for planning AI applications from use-case risk through product role, metrics, milestones, launch, and maintenance.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .node { stroke: #0f172a; stroke-width: 2; rx: 16; }
      .node-title { font: 700 19px Arial, sans-serif; fill: #111827; }
      .body { font: 400 15px Arial, sans-serif; fill: #334155; }
      .small { font: 400 13px Arial, sans-serif; fill: #475569; }
      .arrow { stroke: #111827; stroke-width: 3; marker-end: url(#arrowhead); fill: none; }
      .center { font: 700 22px Arial, sans-serif; fill: #111827; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827" />
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760" />
  <text class="title" x="64" y="70">Planning AI Applications</text>
  <text class="subtitle" x="64" y="103">The chapter's product loop: decide why to build, how AI participates, what success means, and how the system stays useful.</text>

  <rect class="node" x="530" y="315" width="220" height="120" fill="#ffffff" />
  <text class="center" x="570" y="365">Use evidence</text>
  <text class="center" x="565" y="394">to keep moving</text>
  <text class="small" x="568" y="420">Do not trust vibes alone.</text>

  <rect class="node" x="120" y="175" width="230" height="120" fill="#dbeafe" />
  <text class="node-title" x="146" y="215">1. Reason to build</text>
  <text class="body" x="146" y="246">Existential risk, profit,</text>
  <text class="body" x="146" y="268">productivity, or learning.</text>

  <rect class="node" x="525" y="140" width="230" height="120" fill="#dcfce7" />
  <text class="node-title" x="551" y="180">2. AI's role</text>
  <text class="body" x="551" y="211">Critical or complementary,</text>
  <text class="body" x="551" y="233">reactive or proactive.</text>

  <rect class="node" x="930" y="175" width="230" height="120" fill="#fef3c7" />
  <text class="node-title" x="956" y="215">3. Success metrics</text>
  <text class="body" x="956" y="246">Quality, latency, cost,</text>
  <text class="body" x="956" y="268">safety, and feedback.</text>

  <rect class="node" x="930" y="485" width="230" height="120" fill="#fee2e2" />
  <text class="node-title" x="956" y="525">4. Milestones</text>
  <text class="body" x="956" y="556">Crawl, walk, run with</text>
  <text class="body" x="956" y="578">clear promotion gates.</text>

  <rect class="node" x="525" y="520" width="230" height="120" fill="#ede9fe" />
  <text class="node-title" x="551" y="560">5. Launch controls</text>
  <text class="body" x="551" y="591">Version, monitor, trace,</text>
  <text class="body" x="551" y="613">escalate, and roll back.</text>

  <rect class="node" x="120" y="485" width="230" height="120" fill="#ccfbf1" />
  <text class="node-title" x="146" y="525">6. Maintenance</text>
  <text class="body" x="146" y="556">Adapt to model, price,</text>
  <text class="body" x="146" y="578">policy, and user changes.</text>

  <path class="arrow" d="M350 225 C430 180 460 174 515 190" />
  <path class="arrow" d="M755 190 C835 174 865 180 920 225" />
  <path class="arrow" d="M1045 295 L1045 474" />
  <path class="arrow" d="M930 565 C835 625 790 625 765 590" />
  <path class="arrow" d="M525 590 C430 625 385 625 350 565" />
  <path class="arrow" d="M235 485 L235 306" />
</svg>
