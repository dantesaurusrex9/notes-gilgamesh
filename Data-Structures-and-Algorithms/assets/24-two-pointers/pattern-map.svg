<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460">
  <title>Two-pointer pattern family map</title>
  <desc>Taxonomy of two-pointer patterns: opposite-ends (pair sum, container water, palindrome) and same-direction writer/reader (remove duplicates, move zeroes), with pointers to fast/slow and sliding window as relatives.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
    .title  { font-size: 38px; font-weight: 700; }
    .head   { font-size: 26px; font-weight: 700; }
    .body   { font-size: 22px; }
    .mono   { font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", Menlo, Courier, monospace; font-size: 20px; fill: #d63384; }
    .muted  { font-size: 20px; fill: #6b7280; }
    .rel    { font-size: 20px; fill: #0ea5e9; }
  </style>

  <rect width="1200" height="460" fill="#ffffff"/>

  <!-- title -->
  <text x="600" y="50" class="title" text-anchor="middle">Two-Pointer Family Map</text>

  <!-- root box -->
  <rect x="470" y="72" width="260" height="56" rx="10" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="2"/>
  <text x="600" y="108" class="head" text-anchor="middle" fill="#0369a1">Two Pointers</text>

  <!-- branch lines -->
  <line x1="530" y1="128" x2="295" y2="176" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="670" y1="128" x2="905" y2="176" stroke="#6b7280" stroke-width="1.5"/>

  <!-- ── Left branch: opposite-ends ── -->
  <rect x="120" y="176" width="350" height="56" rx="10" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text x="295" y="212" class="head" text-anchor="middle" fill="#0369a1">Opposite Ends</text>

  <!-- children of opposite-ends -->
  <line x1="180" y1="232" x2="150" y2="278" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="295" y1="232" x2="295" y2="278" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="410" y1="232" x2="440" y2="278" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>

  <rect x="60"  y="278" width="185" height="52" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="152" y="300" class="body" text-anchor="middle">Pair Sum</text>
  <text x="152" y="322" class="mono" text-anchor="middle">Two Sum II</text>

  <rect x="200" y="278" width="190" height="52" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="295" y="300" class="body" text-anchor="middle">Maximize area</text>
  <text x="295" y="322" class="mono" text-anchor="middle">Container Water</text>

  <rect x="348" y="278" width="190" height="52" rx="8" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="443" y="300" class="body" text-anchor="middle">Palindrome</text>
  <text x="443" y="322" class="mono" text-anchor="middle">reverse check</text>

  <!-- ── Right branch: same-direction ── -->
  <rect x="730" y="176" width="350" height="56" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="905" y="212" class="head" text-anchor="middle" fill="#166534">Same Direction (Writer/Reader)</text>

  <!-- children of same-direction -->
  <line x1="820" y1="232" x2="790" y2="278" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="990" y1="232" x2="1020" y2="278" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3"/>

  <rect x="680" y="278" width="220" height="52" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="790" y="300" class="body" text-anchor="middle">Remove duplicates</text>
  <text x="790" y="322" class="mono" text-anchor="middle">in-place filter</text>

  <rect x="912" y="278" width="210" height="52" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="1017" y="300" class="body" text-anchor="middle">Move zeroes</text>
  <text x="1017" y="322" class="mono" text-anchor="middle">partition pass</text>

  <!-- ── Relatives band ── -->
  <line x1="600" y1="128" x2="600" y2="370" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="6 4"/>

  <rect x="80"  y="372" width="280" height="54" rx="10" fill="#fdf4ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <text x="220" y="395" class="rel" text-anchor="middle" fill="#7c3aed" font-weight="700">Fast / Slow Pointers</text>
  <text x="220" y="416" class="muted" text-anchor="middle">cycle detection → see Linked Lists</text>

  <rect x="840" y="372" width="280" height="54" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="980" y="395" class="rel" text-anchor="middle" fill="#c2410c" font-weight="700">Sliding Window</text>
  <text x="980" y="416" class="muted" text-anchor="middle">dynamic window width → note 18</text>
</svg>
