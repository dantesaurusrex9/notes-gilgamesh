<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560">
  <title>Writer/reader same-direction two-pointer pass for removing duplicates in place</title>
  <desc>Array [1, 1, 2, 3, 3, 4] mid-pass showing writer (W) and reader (R) pointers. Reader scans forward; writer only advances when a new value is found. Three snapshots illustrate the state before, mid-pass, and after the pass.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: #111827; }
    .title  { font-size: 38px; font-weight: 700; }
    .label  { font-size: 24px; }
    .mono   { font-family: "SF Mono", "Fira Code", "Fira Mono", "Roboto Mono", Menlo, Courier, monospace; font-size: 24px; fill: #d63384; }
    .muted  { font-size: 22px; fill: #6b7280; }
    .note   { font-size: 20px; fill: #6b7280; font-style: italic; }
    .decision { font-size: 21px; fill: #0ea5e9; font-weight: 700; }
  </style>

  <rect width="1200" height="560" fill="#ffffff"/>

  <text x="600" y="50" class="title" text-anchor="middle">Same-Direction Writer / Reader — Remove Duplicates In Place</text>

  <!-- ── Row 1: initial state, W=0 R=0 ── -->
  <text x="60" y="105" class="label" font-weight="700">Initial</text>
  <!-- cells: [1, 1, 2, 3, 3, 4] -->
  <rect x="220" y="110" width="90" height="64" rx="8" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <rect x="315" y="110" width="90" height="64" rx="8" fill="#f0f9ff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="410" y="110" width="90" height="64" rx="8" fill="#f0f9ff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="505" y="110" width="90" height="64" rx="8" fill="#f0f9ff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="600" y="110" width="90" height="64" rx="8" fill="#f0f9ff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="695" y="110" width="90" height="64" rx="8" fill="#f0f9ff" stroke="#e5e7eb" stroke-width="2"/>

  <text x="265" y="152" class="mono" text-anchor="middle">1</text>
  <text x="360" y="152" class="mono" text-anchor="middle">1</text>
  <text x="455" y="152" class="mono" text-anchor="middle">2</text>
  <text x="550" y="152" class="mono" text-anchor="middle">3</text>
  <text x="645" y="152" class="mono" text-anchor="middle">3</text>
  <text x="740" y="152" class="mono" text-anchor="middle">4</text>

  <!-- W and R both at 0 -->
  <text x="265" y="194" class="label" text-anchor="middle" fill="#8b5cf6">W</text>
  <text x="265" y="214" class="label" text-anchor="middle" fill="#0ea5e9">R</text>

  <text x="860" y="148" class="decision">W=0  R=0</text>
  <text x="860" y="175" class="note">both pointers at start</text>

  <!-- divider -->
  <line x1="60" y1="232" x2="1150" y2="232" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- ── Row 2: mid-pass W=1 R=3 ── -->
  <text x="60" y="280" class="label" font-weight="700">Mid-pass</text>
  <!-- [1, 2, 2, 3, 3, 4] — w wrote 2 at index 1; reader at 3 -->
  <rect x="220" y="255" width="90" height="64" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="315" y="255" width="90" height="64" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="410" y="255" width="90" height="64" rx="8" fill="#f5f5f5" stroke="#d1d5db" stroke-width="1" opacity="0.6"/>
  <rect x="505" y="255" width="90" height="64" rx="8" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <rect x="600" y="255" width="90" height="64" rx="8" fill="#f0f9ff" stroke="#e5e7eb" stroke-width="2"/>
  <rect x="695" y="255" width="90" height="64" rx="8" fill="#f0f9ff" stroke="#e5e7eb" stroke-width="2"/>

  <text x="265" y="297" class="mono" text-anchor="middle">1</text>
  <text x="360" y="297" class="mono" text-anchor="middle">2</text>
  <text x="455" y="297" class="mono" text-anchor="middle" fill="#9ca3af">·</text>
  <text x="550" y="297" class="mono" text-anchor="middle">3</text>
  <text x="645" y="297" class="mono" text-anchor="middle">3</text>
  <text x="740" y="297" class="mono" text-anchor="middle">4</text>

  <!-- W at index 2 (overwritten slot), R at 3 -->
  <text x="360" y="340" class="label" text-anchor="middle" fill="#8b5cf6">W=2</text>
  <text x="550" y="340" class="label" text-anchor="middle" fill="#0ea5e9">R=3</text>

  <text x="860" y="290" class="decision">nums[R]=3 ≠ nums[W-1]=2</text>
  <text x="860" y="318" class="note">→ write 3 at W, W+=1, R+=1</text>

  <!-- divider -->
  <line x1="60" y1="368" x2="1150" y2="368" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- ── Row 3: after pass ── -->
  <text x="60" y="416" class="label" font-weight="700">After</text>
  <!-- result: [1, 2, 3, 4 | ·, ·] -->
  <rect x="220" y="393" width="90" height="64" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="315" y="393" width="90" height="64" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="410" y="393" width="90" height="64" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="505" y="393" width="90" height="64" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <rect x="600" y="393" width="90" height="64" rx="8" fill="#f5f5f5" stroke="#d1d5db" stroke-width="1" opacity="0.5"/>
  <rect x="695" y="393" width="90" height="64" rx="8" fill="#f5f5f5" stroke="#d1d5db" stroke-width="1" opacity="0.5"/>

  <text x="265" y="435" class="mono" text-anchor="middle">1</text>
  <text x="360" y="435" class="mono" text-anchor="middle">2</text>
  <text x="455" y="435" class="mono" text-anchor="middle">3</text>
  <text x="550" y="435" class="mono" text-anchor="middle">4</text>
  <text x="645" y="435" class="mono" text-anchor="middle" fill="#9ca3af">·</text>
  <text x="740" y="435" class="mono" text-anchor="middle" fill="#9ca3af">·</text>

  <!-- bracket annotation: unique prefix -->
  <line x1="220" y1="472" x2="594" y2="472" stroke="#16a34a" stroke-width="2"/>
  <line x1="220" y1="465" x2="220" y2="479" stroke="#16a34a" stroke-width="2"/>
  <line x1="594" y1="465" x2="594" y2="479" stroke="#16a34a" stroke-width="2"/>
  <text x="407" y="498" class="label" text-anchor="middle" fill="#16a34a">return W = 4  (unique prefix length)</text>

  <text x="860" y="435" class="decision">O(n) time, O(1) space</text>
  <text x="860" y="462" class="note">one pass, no allocation</text>
</svg>
