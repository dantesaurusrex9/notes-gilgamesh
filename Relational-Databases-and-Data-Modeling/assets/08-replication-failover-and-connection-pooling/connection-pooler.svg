<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580" role="img" aria-labelledby="title desc">
  <title id="title">A connection pooler between an app fleet and PostgreSQL</title>
  <desc id="desc">Many app instances open hundreds of cheap client connections to a pooler such as PgBouncer, which multiplexes them onto a small fixed set of expensive server connections to PostgreSQL.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .app { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .pool{ fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .db  { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .wire{ stroke: #8b5cf6; stroke-width: 2; fill: none; }
    .fat { stroke: #0ea5e9; stroke-width: 4; fill: none; }
  </style>
  <rect width="1200" height="580" fill="#ffffff"/>
  <text class="t" x="40" y="60">Pooler: many client conns, few server conns</text>
  <line x1="40" y1="80" x2="1160" y2="80" stroke="#e5e7eb" stroke-width="2"/>

  <defs>
    <marker id="ap" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="af" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- app fleet -->
  <rect class="app" x="60" y="130" width="220" height="70" rx="8"/><text class="b" x="170" y="173" text-anchor="middle">app pod 1</text>
  <rect class="app" x="60" y="230" width="220" height="70" rx="8"/><text class="b" x="170" y="273" text-anchor="middle">app pod 2</text>
  <rect class="app" x="60" y="330" width="220" height="70" rx="8"/><text class="b" x="170" y="373" text-anchor="middle">app pod 3</text>
  <rect class="app" x="60" y="430" width="220" height="70" rx="8"/><text class="b" x="170" y="473" text-anchor="middle">app pod N</text>
  <text class="s" x="170" y="535" text-anchor="middle">hundreds of client connections (cheap)</text>

  <!-- pooler -->
  <rect class="pool" x="480" y="220" width="280" height="190" rx="10"/>
  <text class="b" x="620" y="270" text-anchor="middle">PgBouncer</text>
  <text class="c" x="620" y="310" text-anchor="middle">pool_size = 20</text>
  <text class="s" x="620" y="350" text-anchor="middle">transaction pooling:</text>
  <text class="s" x="620" y="375" text-anchor="middle">conn borrowed per txn</text>

  <!-- db -->
  <rect class="db" x="940" y="240" width="220" height="150" rx="10"/>
  <text class="b" x="1050" y="295" text-anchor="middle">PostgreSQL</text>
  <text class="s" x="1050" y="335" text-anchor="middle">1 backend process</text>
  <text class="s" x="1050" y="360" text-anchor="middle">per connection</text>

  <!-- wires app -> pooler -->
  <line class="wire" x1="280" y1="165" x2="472" y2="265" marker-end="url(#ap)"/>
  <line class="wire" x1="280" y1="265" x2="472" y2="300" marker-end="url(#ap)"/>
  <line class="wire" x1="280" y1="365" x2="472" y2="335" marker-end="url(#ap)"/>
  <line class="wire" x1="280" y1="465" x2="472" y2="370" marker-end="url(#ap)"/>

  <!-- pooler -> db -->
  <line class="fat" x1="760" y1="300" x2="932" y2="300" marker-end="url(#af)"/>
  <line class="fat" x1="760" y1="340" x2="932" y2="340" marker-end="url(#af)"/>
  <text class="s" x="846" y="275" text-anchor="middle">20 server conns (expensive)</text>
</svg>
