<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">The normalization ladder as a decomposition pipeline</title>
  <desc id="desc">One messy table flows through 1NF, 2NF, and 3NF stages, splitting into orders, order_items, customers, and products tables.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .stage { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0ea5e9; }
    .bad { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .mid { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .good { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
  </style>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text class="t" x="40" y="60">Decomposition pipeline: 0NF → 1NF → 2NF → 3NF</text>
  <line x1="40" y1="80" x2="1160" y2="80" stroke="#e5e7eb" stroke-width="2"/>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#0ea5e9"/></marker>
  </defs>

  <!-- stage 0 -->
  <text class="stage" x="60" y="140">0NF</text>
  <rect class="bad" x="40" y="160" width="230" height="100" rx="10"/>
  <text class="b" x="60" y="200">orders_raw</text>
  <text class="s" x="60" y="232">skus = "A1,B2,C3"</text>
  <text class="s" x="60" y="252">repeating group</text>

  <line x1="270" y1="210" x2="330" y2="210" stroke="#0ea5e9" stroke-width="3" marker-end="url(#a)"/>
  <text class="s" x="265" y="190" fill="#0ea5e9">split rows</text>

  <!-- stage 1 -->
  <text class="stage" x="350" y="140">1NF</text>
  <rect class="mid" x="335" y="160" width="250" height="100" rx="10"/>
  <text class="b" x="355" y="200">order_lines</text>
  <text class="s" x="355" y="232">1 row per (order, sku)</text>
  <text class="s" x="355" y="252">still wide and redundant</text>

  <line x1="585" y1="210" x2="645" y2="210" stroke="#0ea5e9" stroke-width="3" marker-end="url(#a)"/>
  <text class="s" x="575" y="190" fill="#0ea5e9">remove partial deps</text>

  <!-- stage 2 -->
  <text class="stage" x="665" y="140">2NF</text>
  <rect class="mid" x="650" y="160" width="220" height="60" rx="10"/>
  <text class="b" x="670" y="198">orders</text>
  <rect class="mid" x="650" y="240" width="220" height="60" rx="10"/>
  <text class="b" x="670" y="278">order_items</text>
  <rect class="mid" x="650" y="320" width="220" height="60" rx="10"/>
  <text class="b" x="670" y="358">products</text>
  <text class="s" x="650" y="420">orders still carries</text>
  <text class="s" x="650" y="442">customer_email (transitive)</text>

  <line x1="870" y1="270" x2="930" y2="270" stroke="#0ea5e9" stroke-width="3" marker-end="url(#a)"/>
  <text class="s" x="855" y="250" fill="#0ea5e9">remove transitive deps</text>

  <!-- stage 3 -->
  <text class="stage" x="950" y="140">3NF</text>
  <rect class="good" x="935" y="160" width="220" height="60" rx="10"/>
  <text class="b" x="955" y="198">orders</text>
  <rect class="good" x="935" y="240" width="220" height="60" rx="10"/>
  <text class="b" x="955" y="278">order_items</text>
  <rect class="good" x="935" y="320" width="220" height="60" rx="10"/>
  <text class="b" x="955" y="358">products</text>
  <rect class="good" x="935" y="400" width="220" height="60" rx="10"/>
  <text class="b" x="955" y="438">customers</text>

  <text class="s" x="40" y="530">Each arrow is a lossless-join decomposition: joining the pieces back on their keys reconstructs the original rows exactly.</text>
  <text class="s" x="40" y="560">Every non-key attribute now depends on the key, the whole key, and nothing but the key.</text>
</svg>
