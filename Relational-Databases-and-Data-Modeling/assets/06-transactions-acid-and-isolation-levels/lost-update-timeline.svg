<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="title desc">
  <title id="title">Lost update: two transactions read-modify-write the same row</title>
  <desc id="desc">Two-lane timeline. Both transactions read balance 100, both add 50, second commit overwrites the first, final balance 150 instead of 200.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .lane { fill: none; stroke: #e5e7eb; stroke-width: 2; }
  </style>
  <rect width="1200" height="560" fill="#ffffff"/>
  <text x="40" y="60" class="t">Lost update: T2 overwrites T1's write</text>
  <line x1="40" y1="80" x2="1160" y2="80" stroke="#e5e7eb" stroke-width="2"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <!-- lanes -->
  <text x="40" y="150" class="b" font-weight="700">T1 (session A)</text>
  <line x1="250" y1="142" x2="1140" y2="142" class="lane"/>
  <text x="40" y="280" class="b" font-weight="700">T2 (session B)</text>
  <line x1="250" y1="272" x2="1140" y2="272" class="lane"/>
  <text x="40" y="410" class="b" font-weight="700">Row balance</text>
  <line x1="250" y1="402" x2="1140" y2="402" class="lane"/>

  <!-- T1 events -->
  <rect x="260" y="110" width="200" height="52" rx="8" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text x="276" y="144" class="c">READ → 100</text>
  <rect x="700" y="110" width="230" height="52" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text x="716" y="144" class="c">WRITE 150 ✓</text>

  <!-- T2 events -->
  <rect x="480" y="240" width="200" height="52" rx="8" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text x="496" y="274" class="c">READ → 100</text>
  <rect x="950" y="240" width="190" height="52" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="966" y="274" class="c">WRITE 150</text>

  <!-- balance values -->
  <text x="300" y="395" class="c">100</text>
  <text x="780" y="395" class="c">150</text>
  <text x="1010" y="395" class="c">150</text>
  <line x1="800" y1="170" x2="800" y2="380" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arr)"/>
  <line x1="1040" y1="300" x2="1040" y2="380" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arr)"/>

  <!-- annotations -->
  <text x="480" y="330" class="m">T2 read the same stale value 100 before T1 committed</text>
  <rect x="260" y="450" width="880" height="70" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text x="280" y="480" class="b">Both deposits added 50 to the same snapshot of 100.</text>
  <text x="280" y="510" class="b">Final balance: 150. Correct answer: 200. T1's write is lost.</text>
</svg>
