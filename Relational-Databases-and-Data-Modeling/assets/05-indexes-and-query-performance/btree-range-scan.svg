<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">B+tree range scan walking the linked leaf level</title>
  <desc id="desc">A three-level B+tree. Internal nodes hold separator keys only. All rows live in leaf pages linked left to right. A range scan descends once, then follows the leaf chain.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .node { fill: #ffffff; stroke: #6b7280; stroke-width: 2; }
    .hl { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2.5; }
    .ok { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
  </style>
  <rect width="1200" height="620" fill="#ffffff"/>
  <text class="t" x="40" y="58">B+tree: descend once, then walk the leaf chain</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>
  <text class="m" x="40" y="116">Query: WHERE id BETWEEN 23 AND 61 — one root-to-leaf descent, then follow sibling pointers.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- root -->
  <rect class="hl" x="490" y="150" width="220" height="56" rx="8"/>
  <text class="c" x="600" y="186" text-anchor="middle">40 | 80</text>
  <text class="s" x="600" y="142" text-anchor="middle">root page (separator keys only)</text>

  <!-- internal level -->
  <rect class="hl" x="140" y="270" width="220" height="56" rx="8"/>
  <text class="c" x="250" y="306" text-anchor="middle">15 | 30</text>
  <rect class="hl" x="490" y="270" width="220" height="56" rx="8"/>
  <text class="c" x="600" y="306" text-anchor="middle">55 | 70</text>
  <rect class="node" x="840" y="270" width="220" height="56" rx="8"/>
  <text class="c" x="950" y="306" text-anchor="middle">90 | 95</text>
  <text class="s" x="950" y="262" text-anchor="middle">internal pages</text>

  <!-- edges root -> internal -->
  <line x1="540" y1="206" x2="270" y2="266" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="600" y1="206" x2="600" y2="266" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="660" y1="206" x2="930" y2="266" stroke="#6b7280" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- leaves -->
  <rect class="hl" x="60" y="420" width="200" height="56" rx="8"/>
  <text class="c" x="160" y="456" text-anchor="middle">23 | 27</text>
  <rect class="ok" x="320" y="420" width="200" height="56" rx="8"/>
  <text class="c" x="420" y="456" text-anchor="middle">31 | 38</text>
  <rect class="ok" x="580" y="420" width="200" height="56" rx="8"/>
  <text class="c" x="680" y="456" text-anchor="middle">44 | 51 | 58</text>
  <rect class="node" x="840" y="420" width="200" height="56" rx="8"/>
  <text class="c" x="940" y="456" text-anchor="middle">61 | 77</text>
  <text class="s" x="160" y="412" text-anchor="middle">descent lands here</text>
  <text class="s" x="940" y="412" text-anchor="middle">stop after 61</text>

  <!-- edges internal -> leaves -->
  <line x1="200" y1="326" x2="160" y2="416" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="300" y1="326" x2="420" y2="416" stroke="#6b7280" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="560" y1="326" x2="680" y2="416" stroke="#6b7280" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="660" y1="326" x2="930" y2="416" stroke="#6b7280" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- leaf chain -->
  <line x1="260" y1="448" x2="316" y2="448" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="520" y1="448" x2="576" y2="448" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="780" y1="448" x2="836" y2="448" stroke="#0ea5e9" stroke-width="3" marker-end="url(#arr)"/>
  <text class="s" x="600" y="510" text-anchor="middle">linked leaf level: sequential sibling-pointer walk, no re-descent</text>

  <text class="m" x="40" y="566">Each box is one disk page (~8 KB). Blue = pages touched by the descent; green = extra leaves</text>
  <text class="m" x="40" y="598">read by the chain walk. Total I/O = height + leaves in range, not height × matches.</text>
</svg>
