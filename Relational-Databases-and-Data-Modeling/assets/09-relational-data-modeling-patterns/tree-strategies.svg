<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-labelledby="title desc">
  <title id="title">Four SQL tree strategies on one org chart</title>
  <desc id="desc">The same three-node org chart (Ada manages Bob and Cy) stored four ways: adjacency list, path enumeration, nested sets, and closure table.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .h { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .cs { font: 700 20px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
  </style>
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>
  <text class="t" x="40" y="58">One org chart, four storage strategies</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>

  <!-- the tree itself -->
  <defs>
    <marker id="arr2" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <circle cx="600" cy="130" r="34" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="h" x="600" y="139" text-anchor="middle">Ada</text>
  <circle cx="480" cy="230" r="34" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="h" x="480" y="239" text-anchor="middle">Bob</text>
  <circle cx="720" cy="230" r="34" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="h" x="720" y="239" text-anchor="middle">Cy</text>
  <line x1="578" y1="156" x2="502" y2="206" stroke="#6b7280" stroke-width="3" marker-end="url(#arr2)"/>
  <line x1="622" y1="156" x2="698" y2="206" stroke="#6b7280" stroke-width="3" marker-end="url(#arr2)"/>

  <!-- quadrant 1: adjacency list -->
  <text class="h" x="60" y="330">1. Adjacency list</text>
  <text class="s" x="60" y="356">store parent_id; recurse at query time</text>
  <rect x="60" y="370" width="480" height="44" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="cs" x="80" y="399">id   name  manager_id</text>
  <rect x="60" y="414" width="480" height="44" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="cs" x="80" y="443">1    Ada   NULL</text>
  <rect x="60" y="458" width="480" height="44" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="cs" x="80" y="487">2    Bob   1</text>
  <rect x="60" y="502" width="480" height="44" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="cs" x="80" y="531">3    Cy    1</text>

  <!-- quadrant 2: path enumeration -->
  <text class="h" x="640" y="330">2. Path enumeration</text>
  <text class="s" x="640" y="356">store the full materialized path string</text>
  <rect x="640" y="370" width="480" height="44" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="cs" x="660" y="399">id   name  path</text>
  <rect x="640" y="414" width="480" height="44" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="cs" x="660" y="443">1    Ada   /1/</text>
  <rect x="640" y="458" width="480" height="44" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="cs" x="660" y="487">2    Bob   /1/2/</text>
  <rect x="640" y="502" width="480" height="44" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text class="cs" x="660" y="531">3    Cy    /1/3/</text>

  <!-- quadrant 3: nested sets -->
  <text class="h" x="60" y="600">3. Nested sets</text>
  <text class="s" x="60" y="626">lft/rgt from a depth-first walk; descendants are BETWEEN</text>
  <rect x="60" y="640" width="480" height="44" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text class="cs" x="80" y="669">Ada 1..6   Bob 2..3   Cy 4..5</text>

  <!-- quadrant 4: closure table -->
  <text class="h" x="640" y="600">4. Closure table</text>
  <text class="s" x="640" y="626">one row per (ancestor, descendant) pair, incl. self</text>
  <rect x="640" y="640" width="480" height="44" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text class="cs" x="660" y="669">(1,1,0)(2,2,0)(3,3,0)(1,2,1)(1,3,1)</text>
</svg>
