<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="title desc">
  <title id="title">The write path: SQL statement to WAL to data pages</title>
  <desc id="desc">An INSERT flows through the executor into the buffer pool in RAM; the WAL record is fsynced to disk at commit, while the dirty data page is flushed lazily later.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .box { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .ram { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .disk { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .commit { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .arrow { stroke: #0ea5e9; stroke-width: 3; fill: none; }
    .lazy { stroke: #8b5cf6; stroke-width: 3; fill: none; stroke-dasharray: 10 8; }
  </style>
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="ahp" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L12,5 L0,10 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
  <text x="40" y="58" class="t">The write path: commit = WAL fsync</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>

  <!-- client -->
  <rect x="40" y="130" width="260" height="90" rx="10" class="box"/>
  <text x="62" y="170" class="c">INSERT INTO ...</text>
  <text x="62" y="202" class="s">client statement</text>

  <line x1="300" y1="175" x2="390" y2="175" class="arrow" marker-end="url(#ah)"/>

  <!-- RAM zone -->
  <rect x="400" y="110" width="380" height="300" rx="12" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  <text x="420" y="142" class="s">RAM</text>
  <rect x="430" y="160" width="320" height="100" rx="10" class="ram"/>
  <text x="450" y="200" class="b">Buffer pool page</text>
  <text x="450" y="232" class="s">tuple added, page marked DIRTY</text>
  <rect x="430" y="285" width="320" height="100" rx="10" class="ram"/>
  <text x="450" y="325" class="b">WAL buffer</text>
  <text x="450" y="357" class="s">redo record appended in memory</text>

  <!-- arrows to disk -->
  <line x1="750" y1="335" x2="860" y2="335" class="arrow" marker-end="url(#ah)"/>
  <text x="758" y="320" class="s">fsync at COMMIT</text>
  <line x1="750" y1="210" x2="860" y2="210" class="lazy" marker-end="url(#ahp)"/>
  <text x="758" y="195" class="s">flushed lazily, later</text>

  <!-- disk zone -->
  <rect x="870" y="110" width="290" height="300" rx="12" fill="none" stroke="#e5e7eb" stroke-width="2"/>
  <text x="890" y="142" class="s">DISK</text>
  <rect x="895" y="160" width="240" height="100" rx="10" class="disk"/>
  <text x="915" y="200" class="b">Data files</text>
  <text x="915" y="232" class="s">random-write 8 KB pages</text>
  <rect x="895" y="285" width="240" height="100" rx="10" class="disk"/>
  <text x="915" y="325" class="b">WAL file</text>
  <text x="915" y="357" class="s">sequential append only</text>

  <!-- commit point -->
  <rect x="400" y="450" width="760" height="70" rx="10" class="commit"/>
  <text x="420" y="494" class="b">COMMIT POINT: the transaction is durable the instant the WAL record hits disk — data pages can still be only in RAM.</text>
</svg>
