<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="title desc">
  <title id="title">Anatomy of a relation</title>
  <desc id="desc">A table named users showing the heading (attributes with domains), the body (tuples), the primary key column highlighted, and labels for relation, attribute, tuple, and degree/cardinality.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .hdr { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .cell { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1.5; }
    .pk { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .head { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .lbl { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0ea5e9; }
    .arrow { stroke: #0ea5e9; stroke-width: 2.5; fill: none; }
  </style>
  <rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
  <text x="40" y="58" class="t">Anatomy of a relation: users</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>

  <!-- heading row -->
  <rect x="140" y="130" width="200" height="60" class="head"/>
  <rect x="340" y="130" width="280" height="60" class="head"/>
  <rect x="620" y="130" width="220" height="60" class="head"/>
  <text x="160" y="160" class="hdr">id</text>
  <text x="160" y="183" class="s">INTEGER</text>
  <text x="360" y="160" class="hdr">email</text>
  <text x="360" y="183" class="s">TEXT, NOT NULL</text>
  <text x="640" y="160" class="hdr">plan</text>
  <text x="640" y="183" class="s">TEXT</text>

  <!-- body rows -->
  <rect x="140" y="190" width="200" height="60" class="pk"/>
  <rect x="340" y="190" width="280" height="60" class="cell"/>
  <rect x="620" y="190" width="220" height="60" class="cell"/>
  <text x="160" y="228" class="c">1</text>
  <text x="360" y="228" class="b">ada@ex.com</text>
  <text x="640" y="228" class="b">pro</text>

  <rect x="140" y="250" width="200" height="60" class="pk"/>
  <rect x="340" y="250" width="280" height="60" class="cell"/>
  <rect x="620" y="250" width="220" height="60" class="cell"/>
  <text x="160" y="288" class="c">2</text>
  <text x="360" y="288" class="b">bob@ex.com</text>
  <text x="640" y="288" class="b">free</text>

  <rect x="140" y="310" width="200" height="60" class="pk"/>
  <rect x="340" y="310" width="280" height="60" class="cell"/>
  <rect x="620" y="310" width="220" height="60" class="cell"/>
  <text x="160" y="348" class="c">3</text>
  <text x="360" y="348" class="b">cyd@ex.com</text>
  <text x="640" y="348" class="b">free</text>

  <!-- labels -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <text x="880" y="165" class="lbl">heading = set of attributes</text>
  <path d="M870 158 L845 158" class="arrow" marker-end="url(#ah)"/>

  <text x="880" y="285" class="lbl">tuple (one row)</text>
  <path d="M870 278 L845 278" class="arrow" marker-end="url(#ah)"/>

  <text x="140" y="430" class="lbl">primary key (blue): unique, non-NULL</text>
  <path d="M240 408 L240 378" class="arrow" marker-end="url(#ah)"/>

  <text x="620" y="430" class="lbl">attribute domain (type) lives in the heading</text>
  <path d="M730 408 L730 198" class="arrow" marker-end="url(#ah)" opacity="0.5"/>

  <text x="140" y="500" class="m">degree = 3 attributes &#183; cardinality = 3 tuples &#183; body is a SET: no duplicate tuples, no row order</text>
</svg>
