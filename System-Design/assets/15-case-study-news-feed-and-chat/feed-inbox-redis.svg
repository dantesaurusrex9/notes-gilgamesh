<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" role="img" aria-labelledby="title desc">
  <title id="title">Feed inbox as a capped Redis sorted set</title>
  <desc id="desc">A per-user sorted set holds post ids scored by time, newest first. ZADD pushes a new post to the front; ZREMRANGEBYRANK trims the oldest entry beyond the cap, shown as a red evicted cell.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
  </style>
  <rect width="1200" height="470" fill="#ffffff"/>
  <text class="t" x="40" y="56">Feed inbox: a capped sorted set per user</text>
  <line x1="40" y1="74" x2="1160" y2="74" stroke="#e5e7eb" stroke-width="2"/>

  <text class="c" x="60" y="118">inbox:bob</text>
  <text class="m" x="215" y="118">— Redis ZSET, shown newest-first (ZREVRANGE order)</text>

  <text class="s" x="80" y="155">newest</text>
  <text class="s" x="990" y="155" text-anchor="end">oldest</text>

  <!-- cells -->
  <rect x="80" y="165" width="130" height="85" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="145" y="203" text-anchor="middle">P95</text>
  <text class="s" x="145" y="232" text-anchor="middle">t = 944</text>
  <rect x="210" y="165" width="130" height="85" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="275" y="203" text-anchor="middle">P91</text>
  <text class="s" x="275" y="232" text-anchor="middle">t = 941</text>
  <rect x="340" y="165" width="130" height="85" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="405" y="203" text-anchor="middle">P88</text>
  <text class="s" x="405" y="232" text-anchor="middle">t = 938</text>
  <rect x="470" y="165" width="130" height="85" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="535" y="203" text-anchor="middle">P87</text>
  <text class="s" x="535" y="232" text-anchor="middle">t = 933</text>
  <rect x="600" y="165" width="130" height="85" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="665" y="203" text-anchor="middle">P84</text>
  <text class="s" x="665" y="232" text-anchor="middle">t = 921</text>
  <rect x="730" y="165" width="130" height="85" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="795" y="203" text-anchor="middle">P80</text>
  <text class="s" x="795" y="232" text-anchor="middle">t = 918</text>
  <rect x="860" y="165" width="130" height="85" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text class="c" x="925" y="203" text-anchor="middle">P79</text>
  <text class="s" x="925" y="232" text-anchor="middle">t = 905</text>

  <!-- position labels -->
  <text class="s" x="145" y="278" text-anchor="middle">pos 0</text>
  <text class="s" x="275" y="278" text-anchor="middle">pos 1</text>
  <text class="s" x="405" y="278" text-anchor="middle">pos 2</text>
  <text class="s" x="535" y="278" text-anchor="middle">pos 3</text>
  <text class="s" x="665" y="278" text-anchor="middle">pos 4</text>
  <text class="s" x="795" y="278" text-anchor="middle">pos 5</text>
  <text class="s" x="925" y="278" text-anchor="middle">evicted by trim</text>

  <!-- annotations -->
  <text class="c" x="60" y="340">ZADD inbox:bob 944 P95</text>
  <text class="s" x="60" y="368">fan-out worker pushes the new post to the front (O(log n))</text>
  <text class="c" x="620" y="340">ZREMRANGEBYRANK inbox:bob 0 -7</text>
  <text class="s" x="620" y="368">keep only the 6 newest — production cap ≈ 800</text>

  <text class="m" x="60" y="430">Cap bounds memory: 800 ids × 16 B ≈ 13 KB per user. Older history falls back to the pull path.</text>
</svg>
