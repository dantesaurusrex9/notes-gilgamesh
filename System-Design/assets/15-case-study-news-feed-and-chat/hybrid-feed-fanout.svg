<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680" role="img" aria-labelledby="title desc">
  <title id="title">Hybrid feed fan-out architecture</title>
  <desc id="desc">Normal users fan out on write into follower inboxes; celebrities write once and are pulled at read time; the read path merges both sources into one ranked feed.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#ffffff"/>
  <text class="t" x="40" y="56">Hybrid feed fan-out: push normals, pull celebrities</text>
  <line x1="40" y1="74" x2="1160" y2="74" stroke="#e5e7eb" stroke-width="2"/>

  <!-- WRITE: normal user (push) -->
  <text class="s" x="60" y="112">WRITE — NORMAL USER (PUSH)</text>
  <rect x="60" y="130" width="220" height="58" rx="10" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="b" x="170" y="166" text-anchor="middle">alice posts P42</text>
  <line x1="288" y1="159" x2="330" y2="159" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="340" y="130" width="200" height="58" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text class="b" x="440" y="166" text-anchor="middle">fan-out worker</text>
  <line x1="440" y1="192" x2="138" y2="258" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="440" y1="192" x2="320" y2="258" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="440" y1="192" x2="503" y2="258" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="50" y="265" width="170" height="54" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="135" y="299" text-anchor="middle">inbox:bob</text>
  <rect x="235" y="265" width="170" height="54" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="320" y="299" text-anchor="middle">inbox:carol</text>
  <rect x="420" y="265" width="170" height="54" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="505" y="299" text-anchor="middle">inbox:dan</text>
  <text class="m" x="60" y="358">one ZADD per follower — write cost O(F)</text>

  <!-- WRITE: celebrity (pull) -->
  <text class="s" x="640" y="112">WRITE — CELEBRITY (PULL)</text>
  <rect x="640" y="130" width="230" height="58" rx="10" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="b" x="755" y="166" text-anchor="middle">rihanna posts P77</text>
  <line x1="878" y1="159" x2="912" y2="159" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="920" y="130" width="240" height="58" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
  <text class="b" x="1040" y="158" text-anchor="middle">celebrity timeline</text>
  <text class="s" x="1040" y="181" text-anchor="middle">1 write — no fan-out</text>
  <text class="m" x="640" y="225">write cost O(1) — followers pay at read time</text>

  <line x1="40" y1="392" x2="1160" y2="392" stroke="#e5e7eb" stroke-width="2"/>

  <!-- READ path -->
  <text class="s" x="60" y="430">READ — BOB OPENS HIS FEED</text>
  <rect x="60" y="450" width="210" height="58" rx="10" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"/>
  <text class="c" x="165" y="486" text-anchor="middle">GET /feed/bob</text>
  <line x1="272" y1="468" x2="324" y2="450" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="272" y1="492" x2="324" y2="522" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="330" y="420" width="300" height="54" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="c" x="480" y="454" text-anchor="middle">ZREVRANGE inbox:bob</text>
  <rect x="330" y="500" width="300" height="54" rx="10" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
  <text class="b" x="480" y="534" text-anchor="middle">pull rihanna timeline</text>
  <line x1="632" y1="447" x2="694" y2="476" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="632" y1="527" x2="694" y2="502" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="700" y="458" width="190" height="62" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <text class="b" x="795" y="496" text-anchor="middle">merge + rank</text>
  <line x1="892" y1="489" x2="942" y2="489" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="950" y="458" width="210" height="62" rx="10" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="s" x="1055" y="482" text-anchor="middle">home feed</text>
  <text class="c" x="1055" y="508" text-anchor="middle">P91 P88 P84 …</text>

  <text class="m" x="60" y="600">Read cost: O(1 + C) fetches — one inbox read plus one pull per followed celebrity.</text>
  <text class="m" x="60" y="634">A celebrity post defers its 10⁸ inbox writes to read time, amortized across readers.</text>
</svg>
