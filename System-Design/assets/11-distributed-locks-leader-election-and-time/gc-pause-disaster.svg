<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">The GC-pause lock disaster without fencing tokens</title>
  <desc id="desc">Three-lane timeline. Client A acquires a 30 second lease then enters a stop-the-world garbage collection pause. The lease expires during the pause. Client B acquires the lock and writes value v2 to storage. Client A wakes still believing it holds the lock and writes stale data, which storage accepts, destroying B's update.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .lane  { stroke: #e5e7eb; stroke-width: 2; }
    .good  { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .bad   { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .warn  { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .mid   { text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1200" height="660" fill="#ffffff"/>
  <text class="title" x="40" y="58">The GC-pause lock disaster (lease, no fencing)</text>
  <line class="lane" x1="40" y1="80" x2="1160" y2="80"/>

  <!-- lane hairlines -->
  <line class="lane" x1="160" y1="190" x2="1140" y2="190"/>
  <line class="lane" x1="160" y1="340" x2="1140" y2="340"/>
  <line class="lane" x1="160" y1="490" x2="1140" y2="490"/>
  <text class="body" x="40" y="198">Client A</text>
  <text class="body" x="40" y="348">Client B</text>
  <text class="body" x="40" y="498">Storage</text>

  <!-- lease expiry marker -->
  <line x1="600" y1="112" x2="600" y2="540" stroke="#fca5a5" stroke-width="2.5" stroke-dasharray="8 6"/>
  <text class="small mid" x="600" y="104">lease TTL expires</text>

  <!-- Client A lane -->
  <rect class="good" x="170" y="160" width="210" height="60" rx="8"/>
  <text class="body mid" x="275" y="186">acquire OK</text>
  <text class="small mid" x="275" y="210">lease TTL = 30 s</text>

  <rect class="warn" x="400" y="160" width="320" height="60" rx="8"/>
  <text class="body mid" x="560" y="198">stop-the-world GC pause</text>

  <rect class="bad" x="860" y="160" width="270" height="60" rx="8"/>
  <text class="body mid" x="995" y="186">wakes &amp; writes</text>
  <text class="small mid" x="995" y="210">believes lock still held</text>

  <!-- Client B lane -->
  <rect class="good" x="620" y="310" width="180" height="60" rx="8"/>
  <text class="body mid" x="710" y="336">acquire OK</text>
  <text class="small mid" x="710" y="360">new lease granted</text>

  <!-- B write arrow -->
  <line x1="830" y1="372" x2="830" y2="455" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text class="small" x="718" y="415" text-anchor="end">WRITE v2</text>

  <!-- A stale write arrow -->
  <line x1="1040" y1="222" x2="1040" y2="455" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrRed)"/>
  <text class="small" x="1052" y="415">stale WRITE</text>

  <!-- Storage lane -->
  <rect class="good" x="740" y="460" width="180" height="60" rx="8"/>
  <text class="body mid" x="830" y="486">B&#8217;s write</text>
  <text class="small mid" x="830" y="510">value = v2 &#10003;</text>

  <rect class="bad" x="940" y="460" width="200" height="60" rx="8"/>
  <text class="body mid" x="1040" y="486">A&#8217;s stale write</text>
  <text class="small mid" x="1040" y="510">overwrites v2 &#10007;</text>

  <!-- time axis -->
  <line x1="160" y1="565" x2="1120" y2="565" stroke="#6b7280" stroke-width="2" marker-end="url(#arrGray)"/>
  <text class="small" x="1056" y="556">time</text>

  <!-- caption -->
  <text class="muted" x="40" y="612">Storage cannot tell A&#8217;s stale write from a fresh one.</text>
  <text class="muted" x="40" y="644">Last write wins &#8212; B&#8217;s update is silently destroyed.</text>
</svg>
