<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">Fencing tokens make the stale write bounce off</title>
  <desc id="desc">Same three-lane timeline as the disaster figure, but every lock grant now carries a monotonically increasing fencing token. Client A holds token 33, pauses for garbage collection, and the lease expires. Client B acquires token 34 and writes; storage records 34 as the highest token seen. When A wakes and writes with stale token 33, storage compares 33 against 34 and rejects the write, keeping the data safe.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .lane  { stroke: #e5e7eb; stroke-width: 2; }
    .good  { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .bad   { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .warn  { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .mid   { text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrBlue2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrRed2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrGray2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect width="1200" height="660" fill="#ffffff"/>
  <text class="title" x="40" y="58">Fencing tokens: the resource rejects stale holders</text>
  <line class="lane" x1="40" y1="80" x2="1160" y2="80"/>

  <!-- lane hairlines -->
  <line class="lane" x1="160" y1="190" x2="1140" y2="190"/>
  <line class="lane" x1="160" y1="340" x2="1140" y2="340"/>
  <line class="lane" x1="160" y1="490" x2="1140" y2="490"/>
  <text class="body" x="40" y="198">Client A</text>
  <text class="body" x="40" y="348">Client B</text>
  <text class="body" x="40" y="498">Storage</text>

  <!-- lease expiry marker -->
  <line x1="600" y1="112" x2="600" y2="540" stroke="#fca5a5" stroke-width="2.5" stroke-dasharray="8 6"/>
  <text class="small mid" x="600" y="104">lease TTL expires</text>

  <!-- Client A lane -->
  <rect class="good" x="170" y="160" width="210" height="60" rx="8"/>
  <text class="body mid" x="275" y="186">acquire OK</text>
  <text class="small mid" x="275" y="210">fencing token = 33</text>

  <rect class="warn" x="400" y="160" width="320" height="60" rx="8"/>
  <text class="body mid" x="560" y="198">stop-the-world GC pause</text>

  <rect class="warn" x="860" y="160" width="270" height="60" rx="8"/>
  <text class="body mid" x="995" y="186">wakes &amp; writes</text>
  <text class="small mid" x="995" y="210">carries stale token 33</text>

  <!-- Client B lane -->
  <rect class="good" x="620" y="310" width="200" height="60" rx="8"/>
  <text class="body mid" x="720" y="336">acquire OK</text>
  <text class="small mid" x="720" y="360">fencing token = 34</text>

  <!-- B write arrow -->
  <line x1="840" y1="372" x2="840" y2="455" stroke="#0ea5e9" stroke-width="2.5" marker-end="url(#arrBlue2)"/>
  <text class="small" x="828" y="415" text-anchor="end">write(z = 34)</text>

  <!-- A stale write arrow -->
  <line x1="1045" y1="222" x2="1045" y2="455" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrRed2)"/>
  <text class="small" x="1057" y="415">write(z = 33)</text>

  <!-- Storage lane -->
  <rect class="good" x="745" y="460" width="190" height="60" rx="8"/>
  <text class="code mid" x="840" y="488">34 &#8805; 33</text>
  <text class="small mid" x="840" y="512">accept &#8212; max = 34</text>

  <rect class="good" x="955" y="460" width="180" height="60" rx="8"/>
  <text class="code mid" x="1045" y="488">33 &lt; 34</text>
  <text class="small mid" x="1045" y="512">REJECT &#8212; safe &#10003;</text>

  <!-- time axis -->
  <line x1="160" y1="565" x2="1120" y2="565" stroke="#6b7280" stroke-width="2" marker-end="url(#arrGray2)"/>
  <text class="small" x="1056" y="556">time</text>

  <!-- caption -->
  <text class="muted" x="40" y="612">Every grant carries a strictly larger fencing token.</text>
  <text class="muted" x="40" y="644">Storage keeps the highest token seen and rejects smaller ones &#8212; the zombie write bounces off.</text>
</svg>
