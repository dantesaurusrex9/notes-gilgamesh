<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Failure domains and N+1 redundancy</title>
  <desc id="desc">Three availability zones, each a failure domain holding two app servers. Peak demand needs four servers and six are deployed. Zone C has failed, shown in red, but the four healthy servers in zones A and B still meet peak demand.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .bb { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .red { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b91c1c; }
    .hair { stroke: #e5e7eb; stroke-width: 2; }
    .az   { fill: #ffffff; stroke: #4b5563; stroke-width: 2.5; }
    .azred { fill: #ffffff; stroke: #fca5a5; stroke-width: 3; stroke-dasharray: 10 6; }
    .ok   { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .bad  { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
  </style>
  <rect x="0" y="0" width="1200" height="540" fill="#ffffff"/>
  <text class="t" x="60" y="56">Failure domains: size for N+1, survive the largest loss</text>
  <line class="hair" x1="60" y1="76" x2="1140" y2="76"/>
  <text class="b" x="60" y="116">Peak demand = 4 servers (N). Deployed = 6 across 3 domains, so losing any one domain still leaves ≥ N.</text>

  <!-- AZ-a -->
  <rect class="az" x="80" y="150" width="320" height="280" rx="12"/>
  <text class="bb" x="240" y="190" text-anchor="middle">zone A</text>
  <text class="s" x="240" y="214" text-anchor="middle">failure domain</text>
  <rect class="ok" x="140" y="236" width="200" height="64" rx="8"/>
  <text class="b" x="240" y="276" text-anchor="middle">app-1 ✓</text>
  <rect class="ok" x="140" y="320" width="200" height="64" rx="8"/>
  <text class="b" x="240" y="360" text-anchor="middle">app-2 ✓</text>

  <!-- AZ-b -->
  <rect class="az" x="440" y="150" width="320" height="280" rx="12"/>
  <text class="bb" x="600" y="190" text-anchor="middle">zone B</text>
  <text class="s" x="600" y="214" text-anchor="middle">failure domain</text>
  <rect class="ok" x="500" y="236" width="200" height="64" rx="8"/>
  <text class="b" x="600" y="276" text-anchor="middle">app-3 ✓</text>
  <rect class="ok" x="500" y="320" width="200" height="64" rx="8"/>
  <text class="b" x="600" y="360" text-anchor="middle">app-4 ✓</text>

  <!-- AZ-c failed -->
  <rect class="azred" x="800" y="150" width="320" height="280" rx="12"/>
  <text class="red" x="960" y="190" text-anchor="middle">zone C — down</text>
  <text class="s" x="960" y="214" text-anchor="middle" fill="#b91c1c">whole domain lost at once</text>
  <rect class="bad" x="860" y="236" width="200" height="64" rx="8"/>
  <text class="b" x="960" y="276" text-anchor="middle" fill="#b91c1c">app-5 ✗</text>
  <rect class="bad" x="860" y="320" width="200" height="64" rx="8"/>
  <text class="b" x="960" y="360" text-anchor="middle" fill="#b91c1c">app-6 ✗</text>

  <!-- bottom arithmetic -->
  <line class="hair" x1="60" y1="458" x2="1140" y2="458"/>
  <text class="b" x="60" y="500">6 deployed − 2 lost with zone C = 4 healthy ≥ 4 needed → still serving peak. That is N+1 at the domain level.</text>
</svg>
