<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="title desc">
  <title id="title">The canonical scaling evolution in five stages</title>
  <desc id="desc">Five rows. Stage 1 is a single box running app and database. Stage 2 separates the database. Stage 3 puts multiple app servers behind a load balancer. Stage 4 adds a cache and read replicas. Stage 5 shards the database and goes multi-region. Each row names the bottleneck that forces the next stage.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .bb { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .sm { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .hair { stroke: #e5e7eb; stroke-width: 2; }
    .app  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .db   { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .cch  { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .lb   { fill: #ffffff; stroke: #8b5cf6; stroke-width: 2.5; }
    .rg   { fill: #ffffff; stroke: #4b5563; stroke-width: 2; }
    .arrow { stroke: #4b5563; stroke-width: 2.5; fill: none; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>
  <text class="t" x="60" y="56">How systems grow: each bottleneck forces the next stage</text>
  <line class="hair" x1="60" y1="76" x2="1140" y2="76"/>
  <text class="sm" x="790" y="100">the bottleneck that forces the next stage</text>

  <!-- Row 1: single box -->
  <text class="bb" x="60" y="150">Stage 1</text>
  <text class="s" x="60" y="176">single box</text>
  <rect class="app" x="360" y="122" width="220" height="56" rx="8"/>
  <text class="b" x="470" y="157" text-anchor="middle">app + DB</text>
  <text class="s" x="790" y="146" fill="#b91c1c">Any failure = total outage.</text>
  <text class="s" x="790" y="170">CPU, disk, memory all shared.</text>

  <!-- Row 2: separate DB -->
  <line class="hair" x1="60" y1="214" x2="1140" y2="214"/>
  <text class="bb" x="60" y="278">Stage 2</text>
  <text class="s" x="60" y="304">separate DB</text>
  <rect class="app" x="300" y="250" width="130" height="56" rx="8"/>
  <text class="b" x="365" y="285" text-anchor="middle">app</text>
  <rect class="db" x="570" y="250" width="130" height="56" rx="8"/>
  <text class="b" x="635" y="285" text-anchor="middle">DB</text>
  <line class="arrow" x1="430" y1="278" x2="562" y2="278" marker-end="url(#arr)"/>
  <text class="s" x="790" y="274">One app server saturates</text>
  <text class="s" x="790" y="298">its CPU at peak traffic.</text>

  <!-- Row 3: LB + N app servers -->
  <line class="hair" x1="60" y1="342" x2="1140" y2="342"/>
  <text class="bb" x="60" y="406">Stage 3</text>
  <text class="s" x="60" y="432">LB + N apps</text>
  <rect class="lb" x="250" y="378" width="100" height="56" rx="8"/>
  <text class="b" x="300" y="413" text-anchor="middle">LB</text>
  <rect class="app" x="400" y="378" width="86" height="56" rx="8"/>
  <text class="b" x="443" y="413" text-anchor="middle">app</text>
  <rect class="app" x="496" y="378" width="86" height="56" rx="8"/>
  <text class="b" x="539" y="413" text-anchor="middle">app</text>
  <rect class="app" x="592" y="378" width="86" height="56" rx="8"/>
  <text class="b" x="635" y="413" text-anchor="middle">app</text>
  <rect class="db" x="720" y="378" width="100" height="56" rx="8"/>
  <text class="b" x="770" y="413" text-anchor="middle">DB</text>
  <line class="arrow" x1="350" y1="406" x2="392" y2="406" marker-end="url(#arr)"/>
  <line class="arrow" x1="678" y1="406" x2="712" y2="406" marker-end="url(#arr)"/>
  <text class="s" x="860" y="402">Every request hits the DB;</text>
  <text class="s" x="860" y="426">reads crush one primary.</text>

  <!-- Row 4: cache + replicas -->
  <line class="hair" x1="60" y1="470" x2="1140" y2="470"/>
  <text class="bb" x="60" y="534">Stage 4</text>
  <text class="s" x="60" y="560">cache + replicas</text>
  <rect class="lb" x="240" y="506" width="90" height="56" rx="8"/>
  <text class="b" x="285" y="541" text-anchor="middle">LB</text>
  <rect class="app" x="370" y="506" width="110" height="56" rx="8"/>
  <text class="b" x="425" y="541" text-anchor="middle">app ×N</text>
  <rect class="cch" x="520" y="490" width="110" height="44" rx="8"/>
  <text class="b" x="575" y="519" text-anchor="middle">cache</text>
  <rect class="db" x="520" y="544" width="110" height="44" rx="8"/>
  <text class="b" x="575" y="573" text-anchor="middle">primary</text>
  <rect class="db" x="670" y="544" width="130" height="44" rx="8"/>
  <text class="b" x="735" y="573" text-anchor="middle">replica ×2</text>
  <line class="arrow" x1="330" y1="534" x2="362" y2="534" marker-end="url(#arr)"/>
  <line class="arrow" x1="480" y1="520" x2="512" y2="512" marker-end="url(#arr)"/>
  <line class="arrow" x1="480" y1="548" x2="512" y2="560" marker-end="url(#arr)"/>
  <line class="arrow" x1="630" y1="566" x2="662" y2="566" marker-end="url(#arr)"/>
  <text class="s" x="860" y="530">Write volume and dataset</text>
  <text class="s" x="860" y="554">size outgrow one primary.</text>

  <!-- Row 5: shard + multi-region -->
  <line class="hair" x1="60" y1="598" x2="1140" y2="598"/>
  <text class="bb" x="60" y="662">Stage 5</text>
  <text class="s" x="60" y="688">shard + regions</text>
  <rect class="rg" x="250" y="626" width="220" height="88" rx="10"/>
  <text class="b" x="360" y="660" text-anchor="middle">region A</text>
  <text class="s" x="360" y="692" text-anchor="middle">shards 1–4</text>
  <rect class="rg" x="540" y="626" width="220" height="88" rx="10"/>
  <text class="b" x="650" y="660" text-anchor="middle">region B</text>
  <text class="s" x="650" y="692" text-anchor="middle">shards 5–8</text>
  <line class="arrow" x1="470" y1="660" x2="532" y2="660" marker-end="url(#arr)"/>
  <line class="arrow" x1="532" y1="684" x2="470" y2="684" marker-end="url(#arr)"/>
  <text class="s" x="860" y="658">Cross-region latency and</text>
  <text class="s" x="860" y="682">consistency become the cost.</text>
</svg>
