<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760" role="img" aria-labelledby="title desc">
  <title id="title">Offset pagination drifts under concurrent inserts; keyset pagination does not</title>
  <desc id="desc">Top half shows offset/limit pagination: page 1 returns ids 9, 8, 7; a concurrent insert of id 10 shifts every position, so page 2 with OFFSET 3 returns id 7 again. Bottom half shows keyset pagination: the cursor stores last id 7, so page 2 with WHERE id less than 7 returns 6, 5, 4 with no duplicate.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .sect  { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0ea5e9; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .num   { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #111827; text-anchor: middle; }
    .bad   { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b91c1c; }
    .good  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #15803d; }
    .cell  { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .red   { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .blue  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .amber { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
  </style>

  <rect x="0" y="0" width="1200" height="760" fill="#ffffff"/>
  <text class="title" x="40" y="52">Offset drifts under inserts — keyset does not</text>
  <line x1="40" y1="72" x2="1160" y2="72" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Section A: OFFSET -->
  <text class="sect" x="40" y="118">OFFSET / LIMIT</text>
  <text class="body" x="40" y="152">Page 1: ORDER BY id DESC LIMIT 3 OFFSET 0</text>

  <!-- Row 1: ids 9..1, first three green -->
  <rect class="green" x="40"  y="168" width="96" height="56"/>
  <rect class="green" x="136" y="168" width="96" height="56"/>
  <rect class="green" x="232" y="168" width="96" height="56"/>
  <rect class="cell"  x="328" y="168" width="96" height="56"/>
  <rect class="cell"  x="424" y="168" width="96" height="56"/>
  <rect class="cell"  x="520" y="168" width="96" height="56"/>
  <rect class="cell"  x="616" y="168" width="96" height="56"/>
  <rect class="cell"  x="712" y="168" width="96" height="56"/>
  <rect class="cell"  x="808" y="168" width="96" height="56"/>
  <text class="num" x="88"  y="204">9</text>
  <text class="num" x="184" y="204">8</text>
  <text class="num" x="280" y="204">7</text>
  <text class="num" x="376" y="204">6</text>
  <text class="num" x="472" y="204">5</text>
  <text class="num" x="568" y="204">4</text>
  <text class="num" x="664" y="204">3</text>
  <text class="num" x="760" y="204">2</text>
  <text class="num" x="856" y="204">1</text>
  <text class="small" x="88"  y="248" text-anchor="middle">pos 0</text>
  <text class="small" x="184" y="248" text-anchor="middle">pos 1</text>
  <text class="small" x="280" y="248" text-anchor="middle">pos 2</text>
  <text class="small" x="376" y="248" text-anchor="middle">pos 3</text>
  <text class="small" x="472" y="248" text-anchor="middle">pos 4</text>
  <text class="small" x="568" y="248" text-anchor="middle">pos 5</text>
  <text class="small" x="664" y="248" text-anchor="middle">pos 6</text>
  <text class="small" x="760" y="248" text-anchor="middle">pos 7</text>
  <text class="small" x="856" y="248" text-anchor="middle">pos 8</text>
  <text class="code" x="930" y="204">&#8594; 9, 8, 7</text>

  <!-- Row 2: after insert of id 10, OFFSET 3 -->
  <text class="body" x="40" y="300">Writer inserts id 10, then page 2: ORDER BY id DESC LIMIT 3 OFFSET 3</text>
  <rect class="amber" x="40"  y="316" width="96" height="56"/>
  <rect class="cell"  x="136" y="316" width="96" height="56"/>
  <rect class="cell"  x="232" y="316" width="96" height="56"/>
  <rect class="red"   x="328" y="316" width="96" height="56"/>
  <rect class="green" x="424" y="316" width="96" height="56"/>
  <rect class="green" x="520" y="316" width="96" height="56"/>
  <rect class="cell"  x="616" y="316" width="96" height="56"/>
  <rect class="cell"  x="712" y="316" width="96" height="56"/>
  <rect class="cell"  x="808" y="316" width="96" height="56"/>
  <rect class="cell"  x="904" y="316" width="96" height="56"/>
  <text class="num" x="88"  y="352">10</text>
  <text class="num" x="184" y="352">9</text>
  <text class="num" x="280" y="352">8</text>
  <text class="num" x="376" y="352">7</text>
  <text class="num" x="472" y="352">6</text>
  <text class="num" x="568" y="352">5</text>
  <text class="num" x="664" y="352">4</text>
  <text class="num" x="760" y="352">3</text>
  <text class="num" x="856" y="352">2</text>
  <text class="num" x="952" y="352">1</text>
  <text class="small" x="88"  y="396" text-anchor="middle">pos 0</text>
  <text class="small" x="184" y="396" text-anchor="middle">pos 1</text>
  <text class="small" x="280" y="396" text-anchor="middle">pos 2</text>
  <text class="small" x="376" y="396" text-anchor="middle">pos 3</text>
  <text class="small" x="472" y="396" text-anchor="middle">pos 4</text>
  <text class="small" x="568" y="396" text-anchor="middle">pos 5</text>
  <text class="small" x="664" y="396" text-anchor="middle">pos 6</text>
  <text class="small" x="760" y="396" text-anchor="middle">pos 7</text>
  <text class="small" x="856" y="396" text-anchor="middle">pos 8</text>
  <text class="small" x="952" y="396" text-anchor="middle">pos 9</text>
  <text class="small" x="184" y="424" text-anchor="middle">skipped by OFFSET 3</text>
  <text class="bad"   x="376" y="424" text-anchor="middle">duplicate!</text>
  <text class="code"  x="1014" y="352">&#8594; 7, 6, 5</text>
  <text class="muted" x="40" y="458">Every position shifted right by one, so the OFFSET 3 window overlaps page 1. A concurrent</text>
  <text class="muted" x="40" y="488">delete would do the opposite: a row silently skipped. The client never sees an error.</text>

  <!-- Section B: KEYSET -->
  <text class="sect" x="40" y="540">KEYSET (cursor)</text>
  <text class="body" x="40" y="574">Same insert happened. Page 2: WHERE id &lt; 7 ORDER BY id DESC LIMIT 3</text>
  <rect class="amber" x="40"  y="590" width="96" height="56"/>
  <rect class="cell"  x="136" y="590" width="96" height="56"/>
  <rect class="cell"  x="232" y="590" width="96" height="56"/>
  <rect class="blue"  x="328" y="590" width="96" height="56"/>
  <rect class="green" x="424" y="590" width="96" height="56"/>
  <rect class="green" x="520" y="590" width="96" height="56"/>
  <rect class="green" x="616" y="590" width="96" height="56"/>
  <rect class="cell"  x="712" y="590" width="96" height="56"/>
  <rect class="cell"  x="808" y="590" width="96" height="56"/>
  <rect class="cell"  x="904" y="590" width="96" height="56"/>
  <text class="num" x="88"  y="626">10</text>
  <text class="num" x="184" y="626">9</text>
  <text class="num" x="280" y="626">8</text>
  <text class="num" x="376" y="626">7</text>
  <text class="num" x="472" y="626">6</text>
  <text class="num" x="568" y="626">5</text>
  <text class="num" x="664" y="626">4</text>
  <text class="num" x="760" y="626">3</text>
  <text class="num" x="856" y="626">2</text>
  <text class="num" x="952" y="626">1</text>
  <line x1="376" y1="676" x2="376" y2="652" stroke="#4b5563" stroke-width="2.5" marker-end="url(#arr)"/>
  <text class="small" x="376" y="700" text-anchor="middle">cursor: last_id = 7 (anchor)</text>
  <text class="code"  x="1014" y="626">&#8594; 6, 5, 4</text>
  <text class="good"  x="1014" y="656">no dup, no skip</text>
  <text class="muted" x="40" y="744">The predicate anchors to row values, not positions — each page is one O(log N) index seek.</text>
</svg>
