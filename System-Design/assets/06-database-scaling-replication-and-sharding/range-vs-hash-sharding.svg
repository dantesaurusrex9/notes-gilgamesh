<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700" role="img" aria-labelledby="title desc">
  <title id="title">Range versus hash sharding</title>
  <desc id="desc">Top panel: range sharding by last name produces a hot shard because common surnames cluster — shard 3 holds 45 percent of rows and is drawn red. Bottom panel: hash sharding spreads rows uniformly across four green shards, but a range scan must now touch every shard.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .h  { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .bb { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .cs { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
  </style>
  <rect width="1200" height="700" fill="#ffffff"/>

  <text class="t" x="40" y="56">Range vs hash sharding</text>
  <line x1="40" y1="84" x2="1160" y2="84" stroke="#e5e7eb" stroke-width="2"/>

  <!-- ============ panel 1: range sharding ============ -->
  <text class="h" x="40" y="128">Range sharding — shard key: last_name</text>

  <!-- shard 1: A–F, 16% -->
  <rect x="40" y="146" width="260" height="140" fill="#dcfce7" stroke="#86efac" stroke-width="2" rx="8"/>
  <text class="bb" x="170" y="176" text-anchor="middle">A – F</text>
  <rect x="125" y="243.2" width="90" height="28.8" fill="#86efac"/>
  <text class="s" x="170" y="310" text-anchor="middle">shard 1 — 16% of rows</text>

  <!-- shard 2: G–M, 21% -->
  <rect x="330" y="146" width="260" height="140" fill="#dcfce7" stroke="#86efac" stroke-width="2" rx="8"/>
  <text class="bb" x="460" y="176" text-anchor="middle">G – M</text>
  <rect x="415" y="234.2" width="90" height="37.8" fill="#86efac"/>
  <text class="s" x="460" y="310" text-anchor="middle">shard 2 — 21% of rows</text>

  <!-- shard 3: N–S, 45% — HOT -->
  <rect x="620" y="146" width="260" height="140" fill="#fee2e2" stroke="#fca5a5" stroke-width="2" rx="8"/>
  <text class="bb" x="750" y="176" text-anchor="middle">N – S</text>
  <rect x="705" y="191" width="90" height="81" fill="#fca5a5"/>
  <text class="s" x="750" y="310" text-anchor="middle">shard 3 — 45% of rows (HOT)</text>

  <!-- shard 4: T–Z, 18% -->
  <rect x="910" y="146" width="260" height="140" fill="#dcfce7" stroke="#86efac" stroke-width="2" rx="8"/>
  <text class="bb" x="1040" y="176" text-anchor="middle">T – Z</text>
  <rect x="995" y="239.6" width="90" height="32.4" fill="#86efac"/>
  <text class="s" x="1040" y="310" text-anchor="middle">shard 4 — 18% of rows</text>

  <text class="b" x="40" y="346">✓  WHERE last_name BETWEEN 'Lee' AND 'Park' touches one shard (range locality)</text>
  <text class="b" x="40" y="378">✗  Common surnames cluster: shard 3 takes ~45% of the writes — a hot shard</text>

  <line x1="40" y1="404" x2="1160" y2="404" stroke="#e5e7eb" stroke-width="2"/>

  <!-- ============ panel 2: hash sharding ============ -->
  <text class="h" x="40" y="442">Hash sharding — shard key: md5(user_id) mod 4</text>

  <!-- shard 0: 24% -->
  <rect x="40" y="460" width="260" height="140" fill="#dcfce7" stroke="#86efac" stroke-width="2" rx="8"/>
  <text class="cs" x="170" y="490" text-anchor="middle">md5(id) % 4 = 0</text>
  <rect x="125" y="542.8" width="90" height="43.2" fill="#86efac"/>
  <text class="s" x="170" y="624" text-anchor="middle">shard 0 — 24% of rows</text>

  <!-- shard 1: 26% -->
  <rect x="330" y="460" width="260" height="140" fill="#dcfce7" stroke="#86efac" stroke-width="2" rx="8"/>
  <text class="cs" x="460" y="490" text-anchor="middle">md5(id) % 4 = 1</text>
  <rect x="415" y="539.2" width="90" height="46.8" fill="#86efac"/>
  <text class="s" x="460" y="624" text-anchor="middle">shard 1 — 26% of rows</text>

  <!-- shard 2: 25% -->
  <rect x="620" y="460" width="260" height="140" fill="#dcfce7" stroke="#86efac" stroke-width="2" rx="8"/>
  <text class="cs" x="750" y="490" text-anchor="middle">md5(id) % 4 = 2</text>
  <rect x="705" y="541" width="90" height="45" fill="#86efac"/>
  <text class="s" x="750" y="624" text-anchor="middle">shard 2 — 25% of rows</text>

  <!-- shard 3: 25% -->
  <rect x="910" y="460" width="260" height="140" fill="#dcfce7" stroke="#86efac" stroke-width="2" rx="8"/>
  <text class="cs" x="1040" y="490" text-anchor="middle">md5(id) % 4 = 3</text>
  <rect x="995" y="541" width="90" height="45" fill="#86efac"/>
  <text class="s" x="1040" y="624" text-anchor="middle">shard 3 — 25% of rows</text>

  <text class="b" x="40" y="660">✓  Hashing destroys key order, so load spreads evenly — no hot shard from skew</text>
  <text class="b" x="40" y="692">✗  The same range scan now touches all 4 shards (scatter-gather)</text>
</svg>
