<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Consistent hash ring with virtual nodes</title>
  <desc id="desc">A 32-bit hash ring with three database nodes, each owning four virtual nodes scattered around the circle. A key hashes to a point and walks clockwise to the next vnode to find its owner. A joining node d steals only the small amber arc immediately counter-clockwise of its new vnode d#0.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .m  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .cs { font: 700 20px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
  </style>
  <rect width="1200" height="640" fill="#ffffff"/>
  <defs>
    <marker id="mblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
  </defs>

  <text class="t" x="40" y="56">Consistent hash ring with virtual nodes</text>
  <line x1="40" y1="84" x2="1160" y2="84" stroke="#e5e7eb" stroke-width="2"/>

  <!-- the ring -->
  <circle cx="320" cy="395" r="175" fill="none" stroke="#6b7280" stroke-width="2.5"/>
  <text class="m" x="320" y="384" text-anchor="middle">32-bit hash space</text>
  <text class="m" x="320" y="410" text-anchor="middle">0 … 2³² − 1, clockwise</text>

  <!-- amber arc stolen by joining vnode d#0 (201° to 211°) -->
  <path d="M 257.3 558.4 A 175 175 0 0 1 229.9 545.0" fill="none" stroke="#fcd34d" stroke-width="12" stroke-linecap="round"/>

  <!-- clockwise walk of key h(user:42) from 123° to 136° -->
  <path d="M 466.8 490.3 A 175 175 0 0 1 441.6 520.9" fill="none" stroke="#0ea5e9" stroke-width="5" marker-end="url(#mblue)"/>
  <text class="s" x="418" y="476" text-anchor="end" fill="#0ea5e9">clockwise walk</text>

  <!-- vnodes of db-a (blue) -->
  <circle cx="365.3" cy="226.0" r="11" fill="#0ea5e9"/>
  <text class="s" x="373.6" y="201.1" text-anchor="middle">a#0</text>
  <circle cx="489.0" cy="440.3" r="11" fill="#0ea5e9"/>
  <text class="s" x="522.9" y="448.6" text-anchor="middle">a#1</text>
  <circle cx="260.1" cy="559.4" r="11" fill="#0ea5e9"/>
  <text class="s" x="247.2" y="592.5" text-anchor="middle">a#2</text>
  <circle cx="155.6" cy="335.1" r="11" fill="#0ea5e9"/>
  <text class="s" x="123.5" y="330.2" text-anchor="middle">a#3</text>

  <!-- vnodes of db-b (purple) -->
  <circle cx="443.7" cy="271.3" r="11" fill="#8b5cf6"/>
  <text class="s" x="468.4" y="252.6" text-anchor="middle">b#0</text>
  <circle cx="432.5" cy="529.1" r="11" fill="#8b5cf6"/>
  <text class="s" x="455.1" y="559.6" text-anchor="middle">b#1</text>
  <circle cx="155.6" cy="454.9" r="11" fill="#8b5cf6"/>
  <text class="s" x="123.5" y="471.8" text-anchor="middle">b#2</text>
  <circle cx="232.5" cy="243.4" r="11" fill="#8b5cf6"/>
  <text class="s" x="214.5" y="219.7" text-anchor="middle">b#3</text>

  <!-- vnodes of db-c (green) -->
  <circle cx="489.0" cy="349.7" r="11" fill="#86efac"/>
  <text class="s" x="522.9" y="345.4" text-anchor="middle">c#0</text>
  <circle cx="350.4" cy="567.3" r="11" fill="#86efac"/>
  <text class="s" x="357.9" y="601.9" text-anchor="middle">c#1</text>
  <circle cx="185.9" cy="507.5" r="11" fill="#86efac"/>
  <text class="s" x="157.4" y="531.1" text-anchor="middle">c#2</text>
  <circle cx="304.7" cy="220.7" r="11" fill="#86efac"/>
  <text class="s" x="300.0" y="193.8" text-anchor="middle">c#3</text>

  <!-- joining vnode d#0 at 212° (amber, dashed) -->
  <circle cx="227.3" cy="543.4" r="11" fill="#fef3c7" stroke="#fcd34d" stroke-width="3" stroke-dasharray="5 4"/>
  <text class="s" x="200" y="592" text-anchor="end" fill="#6b7280">d#0 joins</text>

  <!-- the key being looked up -->
  <circle cx="471.6" cy="482.5" r="8" fill="#111827"/>
  <line x1="478" y1="494" x2="494" y2="522" stroke="#e5e7eb" stroke-width="2"/>
  <text class="cs" x="490" y="540">h("user:42")</text>

  <!-- right panel: legend -->
  <circle cx="660" cy="133" r="10" fill="#0ea5e9"/>
  <text class="b" x="688" y="141">db-a — vnodes a#0 … a#3</text>
  <circle cx="660" cy="173" r="10" fill="#8b5cf6"/>
  <text class="b" x="688" y="181">db-b — vnodes b#0 … b#3</text>
  <circle cx="660" cy="213" r="10" fill="#86efac"/>
  <text class="b" x="688" y="221">db-c — vnodes c#0 … c#3</text>
  <circle cx="660" cy="253" r="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="3" stroke-dasharray="5 4"/>
  <text class="b" x="688" y="261">db-d — joining, vnode d#0</text>

  <line x1="648" y1="288" x2="1160" y2="288" stroke="#e5e7eb" stroke-width="2"/>

  <!-- right panel: how to read the figure -->
  <text class="b" x="648" y="330">Lookup: hash the key, then walk clockwise</text>
  <text class="b" x="648" y="362">to the next vnode. O(log V) via bisect.</text>
  <text class="b" x="648" y="410">R vnodes scatter each node around the</text>
  <text class="b" x="648" y="442">ring, so per-node load evens out as R grows.</text>
  <text class="b" x="648" y="490">When db-d joins, only the amber arc</text>
  <text class="b" x="648" y="522">changes owner (c → d). Nothing else</text>
  <text class="b" x="648" y="554">moves. mod-N would remap ~75% of keys.</text>

  <text class="m" x="320" y="628" text-anchor="middle">4 vnodes per node shown; production uses 64–512</text>
</svg>
