<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680" role="img" aria-labelledby="title desc">
  <title id="title">Consistent hashing: a new node steals one arc only</title>
  <desc id="desc">Left: a hash ring with nodes A, B, C, D. A new node E lands between A and B; the purple arc from A to E is the only key range that changes owner (from B to E). A sample key inside that arc walks clockwise to E. Right: measured remap fractions — mod-N rehashing moves 80 percent of keys, the ring moves about 23 percent when going from 4 to 5 nodes.</desc>
  <style>
    .t  { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .h  { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .s  { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .sm { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .cs { font: 600 18px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .purple { fill: #8b5cf6; }
    .mid { text-anchor: middle; }
    .end { text-anchor: end; }
  </style>
  <rect width="1200" height="680" fill="#ffffff"/>
  <defs>
    <marker id="mk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d63384"/>
    </marker>
  </defs>

  <text class="t" x="40" y="56">Consistent hashing: a new node steals one arc only</text>
  <line x1="40" y1="78" x2="1160" y2="78" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Ring -->
  <circle cx="300" cy="390" r="185" fill="none" stroke="#e5e7eb" stroke-width="12"/>
  <!-- Stolen arc: 0 deg (top) to 60 deg, clockwise -->
  <path d="M 300 205 A 185 185 0 0 1 460.2 297.5" fill="none" stroke="#8b5cf6" stroke-width="12" stroke-linecap="round"/>

  <!-- Clockwise walk from key (35 deg) toward E (60 deg), outside the ring -->
  <path d="M 429.3 224.5 A 210 210 0 0 1 474.1 272.6" fill="none" stroke="#d63384" stroke-width="2.5" marker-end="url(#mk)"/>

  <!-- Nodes -->
  <circle cx="300" cy="205" r="13" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
  <text class="h mid" x="300" y="180">A</text>
  <circle cx="485" cy="390" r="13" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
  <text class="h" x="515" y="398">B</text>
  <circle cx="300" cy="575" r="13" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
  <text class="h mid" x="300" y="618">C</text>
  <circle cx="115" cy="390" r="13" fill="#0ea5e9" stroke="#ffffff" stroke-width="3"/>
  <text class="h end" x="85" y="398">D</text>
  <circle cx="460.2" cy="297.5" r="13" fill="#8b5cf6" stroke="#ffffff" stroke-width="3"/>
  <text class="h purple" x="487" y="292">E (new)</text>

  <!-- Key inside the stolen arc -->
  <circle cx="406.1" cy="238.4" r="7" fill="#d63384"/>
  <text class="cs" x="430" y="225">key</text>
  <text class="sm purple" x="455" y="170">stolen arc (A → E] — keys here move B → E</text>

  <!-- Right panel -->
  <text class="h" x="660" y="140">Adding E (n: 4 → 5)</text>
  <text class="s" x="660" y="185">• keys in arc (A → E] — previously B's — move to E</text>
  <text class="s" x="660" y="217">• every other key keeps its owner; caches stay hot</text>
  <text class="s" x="660" y="249">• expected fraction moved = 1/(n+1) = 20%</text>

  <text class="sm" x="660" y="312">measured remap, 5 000 keys, 4 → 5 nodes (code in this note)</text>
  <text class="s" x="660" y="355">hash(key) mod N</text>
  <rect x="660" y="365" width="384" height="36" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text class="s end" x="1032" y="390">80% remapped</text>
  <text class="s" x="660" y="440">consistent hash ring</text>
  <rect x="660" y="450" width="108" height="36" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="2"/>
  <text class="s" x="782" y="475">23% remapped</text>
  <line x1="1140" y1="355" x2="1140" y2="492" stroke="#e5e7eb" stroke-width="2"/>
  <text class="sm mid" x="1140" y="518">100%</text>

  <text class="sm" x="660" y="572">with 100 virtual nodes per server, arcs even out:</text>
  <text class="sm" x="660" y="600">load spread ≈ ±10% (relative σ ~ 1/√v)</text>
</svg>
