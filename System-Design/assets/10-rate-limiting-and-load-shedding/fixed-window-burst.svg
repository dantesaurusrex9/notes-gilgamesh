<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" role="img" aria-labelledby="title desc">
  <title id="title">Fixed window boundary burst</title>
  <desc id="desc">A timeline shows two sixty-second windows under a five-per-minute limit. Five requests land just before the boundary at sixty seconds and five more land just after it. All ten are admitted within about one second, twice the intended rate.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .p { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8b5cf6; }
  </style>
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#ffffff"/>
  <text class="t" x="40" y="52">Fixed window flaw: boundary burst doubles the limit</text>
  <line x1="40" y1="72" x2="1160" y2="72" stroke="#e5e7eb" stroke-width="2"/>

  <!-- window regions: 8 px per second, t=0 at x=100 -->
  <rect x="100" y="120" width="480" height="240" fill="#fef3c7" stroke="#fcd34d" stroke-width="2"/>
  <rect x="580" y="120" width="480" height="240" fill="#dbeafe" stroke="#38bdf8" stroke-width="2"/>
  <text class="s" x="320" y="150" text-anchor="middle">window 1 (0–60 s) — count 5/5</text>
  <text class="s" x="850" y="150" text-anchor="middle">window 2 (60–120 s) — count 5/5</text>

  <!-- boundary -->
  <line x1="580" y1="112" x2="580" y2="388" stroke="#8b5cf6" stroke-width="3" stroke-dasharray="8 6"/>
  <text class="p" x="580" y="102" text-anchor="middle">t = 60 s — counter resets to 0</text>

  <!-- request dots: 5 at t ~ 59 s (stacked), 5 at t ~ 60.1 s (stacked) -->
  <circle cx="545" cy="190" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <circle cx="545" cy="225" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <circle cx="545" cy="260" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <circle cx="545" cy="295" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <circle cx="545" cy="330" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <text class="b" x="505" y="268" text-anchor="end">5 requests at t ≈ 59 s</text>

  <circle cx="615" cy="190" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <circle cx="615" cy="225" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <circle cx="615" cy="260" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <circle cx="615" cy="295" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <circle cx="615" cy="330" r="11" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <text class="b" x="655" y="268" text-anchor="start">5 more at t ≈ 60.1 s</text>

  <!-- time axis -->
  <line x1="80" y1="380" x2="1110" y2="380" stroke="#4b5563" stroke-width="3" marker-end="url(#arr2)"/>
  <line x1="100" y1="372" x2="100" y2="388" stroke="#4b5563" stroke-width="3"/>
  <line x1="340" y1="372" x2="340" y2="388" stroke="#4b5563" stroke-width="3"/>
  <line x1="820" y1="372" x2="820" y2="388" stroke="#4b5563" stroke-width="3"/>
  <line x1="1060" y1="372" x2="1060" y2="388" stroke="#4b5563" stroke-width="3"/>
  <text class="s" x="100" y="414" text-anchor="middle">0 s</text>
  <text class="s" x="340" y="414" text-anchor="middle">30 s</text>
  <text class="s" x="580" y="414" text-anchor="middle">60 s</text>
  <text class="s" x="820" y="414" text-anchor="middle">90 s</text>
  <text class="s" x="1060" y="414" text-anchor="middle">120 s</text>

  <!-- verdict -->
  <line x1="600" y1="436" x2="585" y2="396" stroke="#4b5563" stroke-width="3" marker-end="url(#arr2)"/>
  <rect x="300" y="440" width="600" height="56" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/>
  <text class="b" x="600" y="476" text-anchor="middle">10 admitted in ~1.1 s — 2× the 5-per-minute limit</text>
</svg>
