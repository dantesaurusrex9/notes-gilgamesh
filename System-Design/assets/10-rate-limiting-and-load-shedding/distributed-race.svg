<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680" role="img" aria-labelledby="title desc">
  <title id="title">Check-then-set race between two app instances</title>
  <desc id="desc">Two app instances each read a shared Redis counter that holds four under a limit of five. Both see four, both decide to admit, and both write five. Six requests are admitted while the counter only shows five. The fix is an atomic increment or a Lua script.</desc>
  <style>
    .t { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .b { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .m { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .s { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .c { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
  </style>
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4b5563"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#ffffff"/>
  <text class="t" x="40" y="52">Check-then-set race: two admits, one increment</text>
  <line x1="40" y1="72" x2="1160" y2="72" stroke="#e5e7eb" stroke-width="2"/>

  <!-- lifeline heads -->
  <rect x="120" y="100" width="240" height="56" rx="10" fill="#dbeafe" stroke="#38bdf8" stroke-width="3"/>
  <text class="b" x="240" y="136" text-anchor="middle">instance A</text>
  <rect x="480" y="100" width="240" height="56" rx="10" fill="#fef3c7" stroke="#fcd34d" stroke-width="3"/>
  <text class="b" x="600" y="136" text-anchor="middle">Redis: count = 4</text>
  <rect x="840" y="100" width="240" height="56" rx="10" fill="#dbeafe" stroke="#38bdf8" stroke-width="3"/>
  <text class="b" x="960" y="136" text-anchor="middle">instance B</text>

  <!-- lifelines -->
  <line x1="240" y1="156" x2="240" y2="565" stroke="#e5e7eb" stroke-width="3" stroke-dasharray="6 6"/>
  <line x1="600" y1="156" x2="600" y2="565" stroke="#e5e7eb" stroke-width="3" stroke-dasharray="6 6"/>
  <line x1="960" y1="156" x2="960" y2="565" stroke="#e5e7eb" stroke-width="3" stroke-dasharray="6 6"/>

  <!-- 1: A GET -->
  <text class="s" x="420" y="192" text-anchor="middle">1. GET tenant-42</text>
  <line x1="246" y1="202" x2="588" y2="202" stroke="#4b5563" stroke-width="3" marker-end="url(#arr3)"/>
  <!-- 2: reply 4 -->
  <text class="s" x="420" y="234" text-anchor="middle">2. returns 4</text>
  <line x1="594" y1="244" x2="252" y2="244" stroke="#4b5563" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arr3)"/>

  <!-- 3: B GET -->
  <text class="s" x="780" y="284" text-anchor="middle">3. GET tenant-42</text>
  <line x1="954" y1="294" x2="612" y2="294" stroke="#4b5563" stroke-width="3" marker-end="url(#arr3)"/>
  <!-- 4: reply 4 -->
  <text class="s" x="780" y="326" text-anchor="middle">4. returns 4 — already stale</text>
  <line x1="606" y1="336" x2="948" y2="336" stroke="#4b5563" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arr3)"/>

  <!-- decisions -->
  <rect x="120" y="372" width="240" height="48" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <text class="b" x="240" y="404" text-anchor="middle">4 &lt; 5 → admit #5</text>
  <rect x="840" y="372" width="240" height="48" rx="10" fill="#dcfce7" stroke="#86efac" stroke-width="3"/>
  <text class="b" x="960" y="404" text-anchor="middle">4 &lt; 5 → admit #6</text>

  <!-- 5: A SET -->
  <text class="s" x="420" y="462" text-anchor="middle">5. SET tenant-42 = 5</text>
  <line x1="246" y1="472" x2="588" y2="472" stroke="#4b5563" stroke-width="3" marker-end="url(#arr3)"/>
  <!-- 6: B SET -->
  <text class="s" x="780" y="512" text-anchor="middle">6. SET tenant-42 = 5</text>
  <line x1="954" y1="522" x2="612" y2="522" stroke="#4b5563" stroke-width="3" marker-end="url(#arr3)"/>

  <!-- verdict -->
  <rect x="220" y="580" width="760" height="78" rx="10" fill="#fee2e2" stroke="#fca5a5" stroke-width="3"/>
  <text class="b" x="600" y="613" text-anchor="middle">6 requests admitted, counter shows 5 — the limit is broken</text>
  <text class="s" x="600" y="644" text-anchor="middle">fix: atomic INCR, or a Lua script so read + decide + write run as one step</text>
</svg>
