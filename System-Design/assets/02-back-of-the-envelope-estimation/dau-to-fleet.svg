<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" role="img" aria-labelledby="title desc">
  <title id="title">From DAU to fleet size, carrying the units</title>
  <desc id="desc">Five boxes connected by labeled arrows: 100 million DAU times 10 reads per day gives one billion requests per day, divided by 86,400 seconds gives about 12 thousand QPS average, times 3 peak factor gives 36 thousand QPS peak, divided by 5 thousand QPS per node gives 8 nodes.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .op    { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0ea5e9; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
    .boxin { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .boxmid{ fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .boxamb{ fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .boxout{ fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .arrow { stroke: #0ea5e9; stroke-width: 3; fill: none; }
  </style>
  <defs>
    <marker id="tri" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="460" fill="#ffffff"/>
  <text x="40" y="56" class="title">From DAU to fleet size — carry the units</text>
  <line x1="40" y1="76" x2="1160" y2="76" class="rule"/>

  <!-- operation labels above the gaps -->
  <text x="238" y="168" class="op" text-anchor="middle">× 10 reads/day</text>
  <text x="474" y="168" class="op" text-anchor="middle">÷ 86,400 s/day</text>
  <text x="710" y="168" class="op" text-anchor="middle">× 3 peak</text>
  <text x="946" y="168" class="op" text-anchor="middle">÷ 5 K QPS/node</text>

  <!-- boxes -->
  <rect x="20" y="185" width="200" height="110" rx="10" class="boxin"/>
  <text x="120" y="230" class="code" text-anchor="middle">100 M</text>
  <text x="120" y="265" class="small" text-anchor="middle">DAU</text>

  <rect x="256" y="185" width="200" height="110" rx="10" class="boxmid"/>
  <text x="356" y="230" class="code" text-anchor="middle">10⁹</text>
  <text x="356" y="265" class="small" text-anchor="middle">requests / day</text>

  <rect x="492" y="185" width="200" height="110" rx="10" class="boxmid"/>
  <text x="592" y="230" class="code" text-anchor="middle">≈ 12 K</text>
  <text x="592" y="265" class="small" text-anchor="middle">QPS average</text>

  <rect x="728" y="185" width="200" height="110" rx="10" class="boxamb"/>
  <text x="828" y="230" class="code" text-anchor="middle">36 K</text>
  <text x="828" y="265" class="small" text-anchor="middle">QPS peak</text>

  <rect x="964" y="185" width="200" height="110" rx="10" class="boxout"/>
  <text x="1064" y="230" class="code" text-anchor="middle">8 nodes</text>
  <text x="1064" y="265" class="small" text-anchor="middle">7.2 → round up</text>

  <!-- arrows -->
  <line x1="222" y1="240" x2="252" y2="240" class="arrow" marker-end="url(#tri)"/>
  <line x1="458" y1="240" x2="488" y2="240" class="arrow" marker-end="url(#tri)"/>
  <line x1="694" y1="240" x2="724" y2="240" class="arrow" marker-end="url(#tri)"/>
  <line x1="930" y1="240" x2="960" y2="240" class="arrow" marker-end="url(#tri)"/>

  <text x="600" y="365" class="body" text-anchor="middle">Each arrow is one unit conversion. Write the units, cancel them, round hard.</text>
  <text x="600" y="402" class="small" text-anchor="middle">5 K QPS/node is a placeholder — measure your service; stateless APIs land anywhere from 1 K to 10 K.</text>
</svg>
