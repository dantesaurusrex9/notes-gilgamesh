<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="title desc">
  <title id="title">The 80/20 rule sizes the cache</title>
  <desc id="desc">Two rows of ten cells. Top row: objects ranked by popularity, with the first two cells green (the hot 20 percent) and the rest white (the cold 80 percent). Bottom row: read traffic, with eight green cells served from cache and two red cells that miss to the database. An arrow connects the hot objects to the cached traffic. The formula cache bytes equals 0.2 times daily requests times object size appears below.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .hot   { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0ea5e9; }
    .lbl   { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .red   { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .cold  { fill: #ffffff; stroke: #e5e7eb; stroke-width: 2; }
    .arrow { stroke: #8b5cf6; stroke-width: 3; fill: none; }
  </style>
  <defs>
    <marker id="tri" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="560" fill="#ffffff"/>
  <text x="40" y="56" class="title">The 80/20 rule sizes the cache</text>
  <line x1="40" y1="76" x2="1160" y2="76" class="rule"/>

  <!-- row 1: objects ranked by popularity -->
  <text x="80" y="128" class="lbl">Objects, ranked by popularity</text>
  <rect x="80"  y="140" width="100" height="70" class="green"/>
  <rect x="180" y="140" width="100" height="70" class="green"/>
  <rect x="280" y="140" width="100" height="70" class="cold"/>
  <rect x="380" y="140" width="100" height="70" class="cold"/>
  <rect x="480" y="140" width="100" height="70" class="cold"/>
  <rect x="580" y="140" width="100" height="70" class="cold"/>
  <rect x="680" y="140" width="100" height="70" class="cold"/>
  <rect x="780" y="140" width="100" height="70" class="cold"/>
  <rect x="880" y="140" width="100" height="70" class="cold"/>
  <rect x="980" y="140" width="100" height="70" class="cold"/>
  <text x="130" y="183" class="small" text-anchor="middle">1</text>
  <text x="230" y="183" class="small" text-anchor="middle">2</text>
  <text x="330" y="183" class="small" text-anchor="middle">3</text>
  <text x="430" y="183" class="small" text-anchor="middle">4</text>
  <text x="530" y="183" class="small" text-anchor="middle">5</text>
  <text x="630" y="183" class="small" text-anchor="middle">6</text>
  <text x="730" y="183" class="small" text-anchor="middle">7</text>
  <text x="830" y="183" class="small" text-anchor="middle">8</text>
  <text x="930" y="183" class="small" text-anchor="middle">9</text>
  <text x="1030" y="183" class="small" text-anchor="middle">10</text>
  <text x="180" y="240" class="hot" text-anchor="middle">hot 20% → keep in cache</text>
  <text x="680" y="240" class="small" text-anchor="middle">cold 80% → leave on disk</text>

  <!-- arrow: hot objects serve most traffic -->
  <line x1="180" y1="255" x2="450" y2="318" class="arrow" marker-end="url(#tri)"/>

  <!-- row 2: read traffic -->
  <text x="80" y="312" class="lbl">Read traffic</text>
  <rect x="80"  y="328" width="100" height="70" class="green"/>
  <rect x="180" y="328" width="100" height="70" class="green"/>
  <rect x="280" y="328" width="100" height="70" class="green"/>
  <rect x="380" y="328" width="100" height="70" class="green"/>
  <rect x="480" y="328" width="100" height="70" class="green"/>
  <rect x="580" y="328" width="100" height="70" class="green"/>
  <rect x="680" y="328" width="100" height="70" class="green"/>
  <rect x="780" y="328" width="100" height="70" class="green"/>
  <rect x="880" y="328" width="100" height="70" class="red"/>
  <rect x="980" y="328" width="100" height="70" class="red"/>
  <text x="480" y="428" class="lbl" text-anchor="middle">80% of reads served from cache</text>
  <text x="980" y="428" class="small" text-anchor="middle">20% miss → database</text>

  <text x="600" y="486" class="code" text-anchor="middle">cache_bytes ≈ 0.2 × daily_requests × object_size</text>
  <text x="600" y="528" class="small" text-anchor="middle">Popularity is Zipf-shaped. 0.2 is a starting point — refine with the measured hit rate.</text>
</svg>
