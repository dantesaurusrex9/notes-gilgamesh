<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="1200" height="660" role="img" aria-labelledby="title desc">
  <title id="title">Cache-aside: read path and write path</title>
  <desc id="desc">Left panel shows the five-step read-miss path: GET, miss, SELECT, row, SET. Right panel shows the write path: UPDATE the database, commit, then DELETE the cache key.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .h2    { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .label { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .blue  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .amber { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
    .life  { stroke: #e5e7eb; stroke-width: 2; stroke-dasharray: 6 6; }
    .msg   { stroke: #0ea5e9; stroke-width: 3; fill: none; }
    .ret   { stroke: #8b5cf6; stroke-width: 3; fill: none; stroke-dasharray: 8 6; }
  </style>
  <defs>
    <marker id="mblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="mpurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="660" fill="#ffffff"/>
  <text class="title" x="40" y="60">Cache-aside: read path and write path</text>
  <line class="rule" x1="40" y1="82" x2="1160" y2="82"/>

  <text class="h2" x="60" y="132">Read path (miss)</text>
  <text class="h2" x="660" y="132">Write path (invalidate)</text>
  <line class="rule" x1="600" y1="100" x2="600" y2="620"/>

  <!-- LEFT PANEL actors -->
  <rect class="blue"  x="50"  y="150" width="120" height="50" rx="8"/>
  <text class="label" x="110" y="181" text-anchor="middle">App</text>
  <rect class="green" x="240" y="150" width="120" height="50" rx="8"/>
  <text class="label" x="300" y="181" text-anchor="middle">Cache</text>
  <rect class="amber" x="430" y="150" width="120" height="50" rx="8"/>
  <text class="label" x="490" y="181" text-anchor="middle">DB</text>

  <line class="life" x1="110" y1="200" x2="110" y2="600"/>
  <line class="life" x1="300" y1="200" x2="300" y2="600"/>
  <line class="life" x1="490" y1="200" x2="490" y2="600"/>

  <!-- LEFT messages -->
  <line class="msg" x1="110" y1="250" x2="292" y2="250" marker-end="url(#mblue)"/>
  <text class="small" x="205" y="240" text-anchor="middle">1. GET user:42</text>

  <line class="ret" x1="300" y1="320" x2="118" y2="320" marker-end="url(#mpurple)"/>
  <text class="small" x="205" y="310" text-anchor="middle">2. (miss)</text>

  <line class="msg" x1="110" y1="390" x2="482" y2="390" marker-end="url(#mblue)"/>
  <text class="small" x="296" y="380" text-anchor="middle">3. SELECT ... WHERE id = 42</text>

  <line class="ret" x1="490" y1="460" x2="118" y2="460" marker-end="url(#mpurple)"/>
  <text class="small" x="296" y="450" text-anchor="middle">4. row (v1)</text>

  <line class="msg" x1="110" y1="530" x2="292" y2="530" marker-end="url(#mblue)"/>
  <text class="small" x="205" y="520" text-anchor="middle">5. SET v1, TTL+jitter</text>

  <!-- RIGHT PANEL actors -->
  <rect class="blue"  x="650"  y="150" width="120" height="50" rx="8"/>
  <text class="label" x="710"  y="181" text-anchor="middle">App</text>
  <rect class="green" x="860"  y="150" width="120" height="50" rx="8"/>
  <text class="label" x="920"  y="181" text-anchor="middle">Cache</text>
  <rect class="amber" x="1040" y="150" width="120" height="50" rx="8"/>
  <text class="label" x="1100" y="181" text-anchor="middle">DB</text>

  <line class="life" x1="710"  y1="200" x2="710"  y2="600"/>
  <line class="life" x1="920"  y1="200" x2="920"  y2="600"/>
  <line class="life" x1="1100" y1="200" x2="1100" y2="600"/>

  <!-- RIGHT messages -->
  <line class="msg" x1="710" y1="260" x2="1092" y2="260" marker-end="url(#mblue)"/>
  <text class="small" x="900" y="250" text-anchor="middle">1. UPDATE row to v2; COMMIT</text>

  <line class="ret" x1="1100" y1="330" x2="718" y2="330" marker-end="url(#mpurple)"/>
  <text class="small" x="900" y="320" text-anchor="middle">2. commit OK</text>

  <line class="msg" x1="710" y1="400" x2="912" y2="400" marker-end="url(#mblue)"/>
  <text class="small" x="811" y="390" text-anchor="middle">3. DEL user:42</text>

  <rect class="amber" x="650" y="450" width="510" height="80" rx="10"/>
  <text class="label" x="670" y="484">Invalidate AFTER the commit, never before:</text>
  <text class="label" x="670" y="512">a read between them would re-fill the old value.</text>

  <text class="muted" x="660" y="585">Next read repopulates v2 via the read path.</text>
</svg>
