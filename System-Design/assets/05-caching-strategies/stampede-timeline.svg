<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Cache stampede: one expiry, N concurrent rebuilds</title>
  <desc id="desc">Two timelines. Top: after a TTL expiry, six concurrent requests each launch an identical database query. Bottom: with a per-key lock, one request rebuilds the key while the other five wait briefly and are then served from the refilled cache.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .h2    { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .redbar   { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .greenbar { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .waitbar  { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .rule   { stroke: #e5e7eb; stroke-width: 2; }
    .axis   { stroke: #6b7280; stroke-width: 2; fill: none; }
    .expiry { stroke: #fca5a5; stroke-width: 3; stroke-dasharray: 8 6; }
  </style>
  <defs>
    <marker id="agray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="640" fill="#ffffff"/>
  <text class="title" x="40" y="60">Cache stampede: one expiry, N concurrent rebuilds</text>
  <line class="rule" x1="40" y1="82" x2="1160" y2="82"/>

  <!-- LANE 1: no protection -->
  <text class="h2" x="40" y="136">No protection</text>
  <line class="expiry" x1="300" y1="150" x2="300" y2="320"/>
  <text class="small" x="300" y="345" text-anchor="middle">TTL expires</text>

  <rect class="redbar" x="310" y="156" width="300" height="18"/>
  <rect class="redbar" x="326" y="178" width="300" height="18"/>
  <rect class="redbar" x="342" y="200" width="300" height="18"/>
  <rect class="redbar" x="358" y="222" width="300" height="18"/>
  <rect class="redbar" x="374" y="244" width="300" height="18"/>
  <rect class="redbar" x="390" y="266" width="300" height="18"/>
  <text class="body" x="720" y="220">6 identical DB queries in flight</text>
  <text class="small" x="720" y="250">each bar = one ~50 ms rebuild of the SAME key</text>

  <line class="axis" x1="100" y1="320" x2="1100" y2="320" marker-end="url(#agray)"/>
  <text class="small" x="1100" y="345" text-anchor="end">time</text>

  <!-- LANE 2: single flight -->
  <text class="h2" x="40" y="406">Per-key lock (single flight)</text>
  <line class="expiry" x1="300" y1="420" x2="300" y2="560"/>
  <text class="small" x="300" y="585" text-anchor="middle">TTL expires</text>

  <rect class="greenbar" x="310" y="426" width="300" height="18"/>
  <text class="small" x="626" y="441">rebuild: the ONLY DB query</text>

  <rect class="waitbar" x="326" y="450" width="288" height="14"/>
  <rect class="waitbar" x="342" y="470" width="272" height="14"/>
  <rect class="waitbar" x="358" y="490" width="256" height="14"/>
  <rect class="waitbar" x="374" y="510" width="240" height="14"/>
  <rect class="waitbar" x="390" y="530" width="224" height="14"/>
  <rect class="greenbar" x="620" y="450" width="14" height="94"/>
  <text class="small" x="650" y="500">5 requests wait on the lock,</text>
  <text class="small" x="650" y="524">then read the refilled key</text>

  <line class="axis" x1="100" y1="560" x2="1100" y2="560" marker-end="url(#agray)"/>

  <text class="muted" x="40" y="620">Same arrival pattern in both lanes; the lock turns 6 origin hits into 1. Stale-while-revalidate removes even the waiting.</text>
</svg>
