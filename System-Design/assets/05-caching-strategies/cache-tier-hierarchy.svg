<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-labelledby="title desc">
  <title id="title">Where caches live: the hit-cost hierarchy</title>
  <desc id="desc">Six tiers from browser cache to database disk, each with its typical answer latency. A request travels deeper only when the current tier misses.</desc>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .muted { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
    .label { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .code  { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .blue  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .amber { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .red   { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .rule  { stroke: #e5e7eb; stroke-width: 2; }
    .arrow { stroke: #0ea5e9; stroke-width: 3; fill: none; }
  </style>
  <defs>
    <marker id="tri" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="600" fill="#ffffff"/>
  <text class="title" x="40" y="60">Where caches live: the hit-cost hierarchy</text>
  <line class="rule" x1="40" y1="82" x2="1160" y2="82"/>

  <!-- Tier boxes -->
  <rect class="green" x="40"   y="140" width="170" height="110" rx="10"/>
  <text class="label" x="125"  y="186" text-anchor="middle">Browser</text>
  <text class="label" x="125"  y="212" text-anchor="middle">cache</text>

  <rect class="green" x="234"  y="140" width="170" height="110" rx="10"/>
  <text class="label" x="319"  y="186" text-anchor="middle">CDN</text>
  <text class="label" x="319"  y="212" text-anchor="middle">edge PoP</text>

  <rect class="blue"  x="428"  y="140" width="170" height="110" rx="10"/>
  <text class="label" x="513"  y="186" text-anchor="middle">In-process</text>
  <text class="label" x="513"  y="212" text-anchor="middle">dict / LRU</text>

  <rect class="blue"  x="622"  y="140" width="170" height="110" rx="10"/>
  <text class="label" x="707"  y="186" text-anchor="middle">Redis /</text>
  <text class="label" x="707"  y="212" text-anchor="middle">Memcached</text>

  <rect class="amber" x="816"  y="140" width="170" height="110" rx="10"/>
  <text class="label" x="901"  y="186" text-anchor="middle">DB buffer</text>
  <text class="label" x="901"  y="212" text-anchor="middle">pool (RAM)</text>

  <rect class="red"   x="1010" y="140" width="170" height="110" rx="10"/>
  <text class="label" x="1095" y="186" text-anchor="middle">DB pages</text>
  <text class="label" x="1095" y="212" text-anchor="middle">on disk</text>

  <!-- Miss arrows between boxes -->
  <line class="arrow" x1="212" y1="195" x2="230" y2="195" marker-end="url(#tri)"/>
  <line class="arrow" x1="406" y1="195" x2="424" y2="195" marker-end="url(#tri)"/>
  <line class="arrow" x1="600" y1="195" x2="618" y2="195" marker-end="url(#tri)"/>
  <line class="arrow" x1="794" y1="195" x2="812" y2="195" marker-end="url(#tri)"/>
  <line class="arrow" x1="988" y1="195" x2="1006" y2="195" marker-end="url(#tri)"/>

  <!-- Latency labels -->
  <text class="code" x="125"  y="296" text-anchor="middle">~0 ms</text>
  <text class="code" x="319"  y="296" text-anchor="middle">10-30 ms</text>
  <text class="code" x="513"  y="296" text-anchor="middle">~100 ns</text>
  <text class="code" x="707"  y="296" text-anchor="middle">~0.5 ms</text>
  <text class="code" x="901"  y="296" text-anchor="middle">~1 ms</text>
  <text class="code" x="1095" y="296" text-anchor="middle">5-30 ms</text>

  <text class="small" x="125"  y="328" text-anchor="middle">no network</text>
  <text class="small" x="319"  y="328" text-anchor="middle">RTT to edge</text>
  <text class="small" x="513"  y="328" text-anchor="middle">same heap</text>
  <text class="small" x="707"  y="328" text-anchor="middle">one LAN hop</text>
  <text class="small" x="901"  y="328" text-anchor="middle">query, no I/O</text>
  <text class="small" x="1095" y="328" text-anchor="middle">SSD reads + query</text>

  <!-- Depth arrow -->
  <line class="arrow" x1="40" y1="400" x2="1160" y2="400" marker-end="url(#tri)"/>
  <text class="body" x="600" y="442" text-anchor="middle">a request travels deeper only on a miss</text>

  <text class="muted" x="40" y="510">Each tier absorbs a fraction of traffic; the database sees only the misses of every layer above it.</text>
  <text class="muted" x="40" y="548">Browser/CDN latencies are seen from the client; the remaining tiers are seen from the app server.</text>
</svg>
