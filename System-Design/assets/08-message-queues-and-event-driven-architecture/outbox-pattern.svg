<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" role="img" aria-labelledby="title desc">
  <title id="title">Transactional outbox: one atomic commit, then asynchronous publish</title>
  <desc id="desc">The checkout service writes the order row and an outbox row inside one ACID database transaction, shown as an amber dashed boundary. A relay process polls unpublished outbox rows, publishes them to the broker topic, then marks each row as sent. The broker fans events out to the email and inventory consumer groups. Numbered circles mark the five steps; a caption at the bottom explains each number.</desc>
  <defs>
    <marker id="arrG2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .codeS { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
    .num   { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
    .blue  { fill: #dbeafe; stroke: #38bdf8; stroke-width: 2; }
    .white { fill: #ffffff; stroke: #6b7280; stroke-width: 1.5; }
    .green { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .txn   { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; stroke-dasharray: 8 6; }
    .relay { fill: #ffffff; stroke: #8b5cf6; stroke-width: 2.5; }
    .step  { stroke: #6b7280; stroke-width: 3; }
    .back  { stroke: #6b7280; stroke-width: 3; stroke-dasharray: 7 5; }
  </style>
  <rect width="1200" height="640" fill="#ffffff"/>

  <text x="40" y="54" class="title">Transactional outbox</text>
  <line x1="40" y1="72" x2="1160" y2="72" stroke="#e5e7eb" stroke-width="2"/>

  <!-- checkout service -->
  <rect x="40" y="240" width="200" height="90" rx="10" class="blue"/>
  <text x="140" y="278" class="body" text-anchor="middle">checkout</text>
  <text x="140" y="308" class="body" text-anchor="middle">service</text>

  <!-- single DB transaction boundary -->
  <rect x="300" y="130" width="320" height="330" rx="12" class="txn"/>
  <text x="460" y="160" class="small" text-anchor="middle">single DB transaction</text>
  <rect x="330" y="180" width="260" height="90" rx="8" class="white"/>
  <text x="460" y="216" class="body" text-anchor="middle">orders table</text>
  <text x="460" y="248" class="codeS" text-anchor="middle">INSERT order A100</text>
  <rect x="330" y="340" width="260" height="90" rx="8" class="white"/>
  <text x="460" y="376" class="body" text-anchor="middle">outbox table</text>
  <text x="460" y="408" class="codeS" text-anchor="middle">INSERT OrderCreated</text>

  <!-- step 1: commit -->
  <line x1="240" y1="285" x2="294" y2="285" class="step" marker-end="url(#arrG2)"/>
  <circle cx="267" cy="259" r="14" fill="#0ea5e9"/>
  <text x="267" y="265" class="num" text-anchor="middle">1</text>

  <!-- relay -->
  <rect x="690" y="340" width="180" height="90" rx="10" class="relay"/>
  <text x="780" y="378" class="body" text-anchor="middle">relay</text>
  <text x="780" y="408" class="small" text-anchor="middle">poller / CDC</text>

  <!-- step 2: poll, step 4: mark sent -->
  <line x1="590" y1="405" x2="684" y2="405" class="step" marker-end="url(#arrG2)"/>
  <circle cx="640" cy="433" r="14" fill="#0ea5e9"/>
  <text x="640" y="439" class="num" text-anchor="middle">2</text>
  <line x1="690" y1="365" x2="596" y2="365" class="back" marker-end="url(#arrG2)"/>
  <circle cx="640" cy="337" r="14" fill="#0ea5e9"/>
  <text x="640" y="343" class="num" text-anchor="middle">4</text>

  <!-- broker -->
  <rect x="940" y="340" width="220" height="90" rx="10" class="blue"/>
  <text x="1050" y="376" class="body" text-anchor="middle">broker topic</text>
  <text x="1050" y="408" class="codeS" text-anchor="middle">order-events</text>

  <!-- step 3: publish -->
  <line x1="870" y1="385" x2="934" y2="385" class="step" marker-end="url(#arrG2)"/>
  <circle cx="902" cy="359" r="14" fill="#0ea5e9"/>
  <text x="902" y="365" class="num" text-anchor="middle">3</text>

  <!-- step 5: fan-out to consumer groups -->
  <rect x="730" y="490" width="200" height="64" rx="8" class="green"/>
  <text x="830" y="530" class="body" text-anchor="middle">email group</text>
  <rect x="970" y="490" width="200" height="64" rx="8" class="green"/>
  <text x="1070" y="530" class="body" text-anchor="middle">inventory group</text>
  <line x1="1000" y1="430" x2="850" y2="484" class="step" marker-end="url(#arrG2)"/>
  <line x1="1080" y1="430" x2="1070" y2="484" class="step" marker-end="url(#arrG2)"/>
  <circle cx="938" cy="462" r="14" fill="#0ea5e9"/>
  <text x="938" y="468" class="num" text-anchor="middle">5</text>

  <!-- caption -->
  <text x="600" y="592" class="small" text-anchor="middle">1 commit order row + outbox row atomically  ·  2 relay polls unpublished rows  ·  3 publish to broker</text>
  <text x="600" y="618" class="small" text-anchor="middle">4 mark row published (at-least-once if the relay crashes between 3 and 4)  ·  5 consumer groups fan out</text>
</svg>
