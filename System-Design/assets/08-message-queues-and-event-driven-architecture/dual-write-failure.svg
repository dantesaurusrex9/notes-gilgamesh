<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">The dual-write problem: two writes, no shared transaction</title>
  <desc id="desc">Two side-by-side panels. Left panel: the service commits the order to the database first, then crashes before publishing the event, so downstream consumers never run. Right panel: the service publishes the event first, then the database write fails, so consumers react to an order that does not exist. An amber banner at the bottom states that neither ordering is safe because two independent systems cannot commit atomically.</desc>
  <defs>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>
  <style>
    .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .h2    { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .body  { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
    .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6b7280; }
    .ok    { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
    .bad   { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
    .amber { fill: #fef3c7; stroke: #fcd34d; stroke-width: 2; }
    .step  { stroke: #6b7280; stroke-width: 3; }
  </style>
  <rect width="1200" height="620" fill="#ffffff"/>

  <text x="40" y="54" class="title">The dual-write problem</text>
  <line x1="40" y1="72" x2="1160" y2="72" stroke="#e5e7eb" stroke-width="2"/>
  <line x1="592" y1="100" x2="592" y2="470" stroke="#e5e7eb" stroke-width="2"/>

  <!-- left panel: DB first -->
  <text x="80" y="130" class="h2">Attempt 1 — DB first, then publish</text>
  <rect x="70" y="156" width="460" height="64" rx="10" class="ok"/>
  <text x="300" y="196" class="body" text-anchor="middle">1 · INSERT order — COMMIT  ✓</text>
  <line x1="300" y1="224" x2="300" y2="252" class="step" marker-end="url(#arrG)"/>
  <rect x="330" y="222" width="190" height="30" rx="6" class="amber"/>
  <text x="425" y="243" class="small" text-anchor="middle">the failure window</text>
  <rect x="70" y="260" width="460" height="64" rx="10" class="bad"/>
  <text x="300" y="300" class="body" text-anchor="middle">2 · publish event  ✗  process crashes</text>
  <line x1="300" y1="328" x2="300" y2="356" class="step" marker-end="url(#arrG)"/>
  <rect x="70" y="364" width="460" height="92" rx="10" class="bad"/>
  <text x="300" y="402" class="body" text-anchor="middle">Order saved, event never sent</text>
  <text x="300" y="434" class="small" text-anchor="middle">email, inventory, analytics consumers never run</text>

  <!-- right panel: publish first -->
  <text x="650" y="130" class="h2">Attempt 2 — publish first, then DB</text>
  <rect x="640" y="156" width="460" height="64" rx="10" class="ok"/>
  <text x="870" y="196" class="body" text-anchor="middle">1 · publish OrderCreated  ✓</text>
  <line x1="870" y1="224" x2="870" y2="252" class="step" marker-end="url(#arrG)"/>
  <rect x="900" y="222" width="190" height="30" rx="6" class="amber"/>
  <text x="995" y="243" class="small" text-anchor="middle">the failure window</text>
  <rect x="640" y="260" width="460" height="64" rx="10" class="bad"/>
  <text x="870" y="300" class="body" text-anchor="middle">2 · INSERT order  ✗  txn rolls back</text>
  <line x1="870" y1="328" x2="870" y2="356" class="step" marker-end="url(#arrG)"/>
  <rect x="640" y="364" width="460" height="92" rx="10" class="bad"/>
  <text x="870" y="402" class="body" text-anchor="middle">Phantom event published</text>
  <text x="870" y="434" class="small" text-anchor="middle">consumers react to an order that does not exist</text>

  <!-- bottom banner -->
  <rect x="80" y="510" width="1040" height="70" rx="10" class="amber"/>
  <text x="600" y="553" class="body" text-anchor="middle">Neither ordering is safe — two independent systems cannot commit atomically.</text>
</svg>
