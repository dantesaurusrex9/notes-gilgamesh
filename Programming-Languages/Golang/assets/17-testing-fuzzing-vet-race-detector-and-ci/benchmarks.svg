<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Golang - Benchmarks</title>
  <desc id="desc">Visual study diagram for the Benchmarks section in 17 - Testing, Fuzzing, Vet, Race Detector, and CI.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0891b2"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="#f7feff"/>
  <rect x="28" y="28" width="904" height="484" rx="28" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="28" y="28" width="904" height="82" rx="28" fill="#cffafe"/>
  <rect x="28" y="82" width="904" height="28" fill="#cffafe"/>
  <text x="60" y="66" font-size="18" font-weight="800" fill="#0891b2">Golang visual model</text>
  <text x="60" y="96" text-anchor="start" font-size="28" font-weight="850" fill="#0f172a"><tspan x="60" dy="0">Benchmarks</tspan></text>
  <text x="900" y="66" text-anchor="end" font-size="14" font-weight="700" fill="#475569">concurrency</text>
  <rect x="80" y="220" width="800" height="64" rx="14" fill="#eff6ff" stroke="#cbd5e1" stroke-width="2"/><text x="116" y="259" text-anchor="start" font-size="19" font-weight="800" fill="#0f172a"><tspan x="116" dy="0">Hot path</tspan></text><rect x="80" y="315" width="800" height="64" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/><text x="116" y="354" text-anchor="start" font-size="19" font-weight="800" fill="#0f172a"><tspan x="116" dy="0">Profile</tspan></text><rect x="80" y="410" width="800" height="64" rx="14" fill="#ecfdf5" stroke="#cbd5e1" stroke-width="2"/><text x="116" y="449" text-anchor="start" font-size="19" font-weight="800" fill="#0f172a"><tspan x="116" dy="0">Re-measure</tspan></text><rect x="350" y="240" width="160" height="44" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><rect x="555" y="335" width="170" height="44" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="2"/><rect x="350" y="430" width="175" height="44" rx="12" fill="#dcfce7" stroke="#0f766e" stroke-width="2"/><text x="430" y="268" text-anchor="middle" font-size="15" font-weight="800" fill="#075985"><tspan x="430" dy="0">submit / await</tspan></text><text x="640" y="363" text-anchor="middle" font-size="15" font-weight="800" fill="#075985"><tspan x="640" dy="0">Optimize</tspan></text><text x="438" y="458" text-anchor="middle" font-size="15" font-weight="800" fill="#166534"><tspan x="438" dy="0">consistent result</tspan></text><path d="M 430 286 C 532.5 286, 532.5 333, 635 333" fill="none" stroke="#0891b2" stroke-width="3" marker-end="url(#arrow)"/><path d="M 635 379 C 536.5 379, 536.5 428, 438 428" fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)"/><text x="480" y="510" text-anchor="middle" font-size="17" font-weight="650" fill="#334155"><tspan x="480" dy="0">Waiting, scheduling, and shared state are separate concerns.</tspan></text>
</svg>
