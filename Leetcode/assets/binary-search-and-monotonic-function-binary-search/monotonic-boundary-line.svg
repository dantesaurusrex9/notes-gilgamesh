<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Monotonic boolean boundary</title>
  <desc id="desc">A false false false true true true sequence with the boundary at the first true value.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rule { stroke: #e5e7eb; stroke-width: 2; }
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 25px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .falseCell { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
      .trueCell { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
      .value { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .falseText { fill: #b91c1c; }
      .trueText { fill: #15803d; }
      .boundary { stroke: #8b5cf6; stroke-width: 5; stroke-dasharray: 10 10; stroke-linecap: round; }
      .answer { fill: #0ea5e9; }
      .faint { fill: #6b7280; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="64" y="78">Monotonic Boolean Shape</text>
  <line class="rule" x1="64" y1="106" x2="1136" y2="106"/>
  <text class="body" x="64" y="162">Binary search works when candidates line up as</text>
  <text class="mono" x="596" y="162">False ... True</text>
  <text class="body" x="791" y="162">.</text>
  <text class="body" x="64" y="209">The answer is the first candidate where feasibility becomes true.</text>

  <g transform="translate(210 330)">
    <rect class="falseCell" x="0" y="0" width="130" height="82"/>
    <rect class="falseCell" x="130" y="0" width="130" height="82"/>
    <rect class="falseCell" x="260" y="0" width="130" height="82"/>
    <rect class="trueCell" x="390" y="0" width="130" height="82"/>
    <rect class="trueCell" x="520" y="0" width="130" height="82"/>
    <rect class="trueCell" x="650" y="0" width="130" height="82"/>

    <text class="value falseText" x="65" y="51" text-anchor="middle">False</text>
    <text class="value falseText" x="195" y="51" text-anchor="middle">False</text>
    <text class="value falseText" x="325" y="51" text-anchor="middle">False</text>
    <text class="value trueText" x="455" y="51" text-anchor="middle">True</text>
    <text class="value trueText" x="585" y="51" text-anchor="middle">True</text>
    <text class="value trueText" x="715" y="51" text-anchor="middle">True</text>

    <text class="tiny" x="65" y="112" text-anchor="middle">candidate 1</text>
    <text class="tiny" x="195" y="112" text-anchor="middle">2</text>
    <text class="tiny" x="325" y="112" text-anchor="middle">3</text>
    <text class="tiny" x="455" y="112" text-anchor="middle">4</text>
    <text class="tiny" x="585" y="112" text-anchor="middle">5</text>
    <text class="tiny" x="715" y="112" text-anchor="middle">6</text>

    <line class="boundary" x1="390" y1="-50" x2="390" y2="145"/>
    <polygon class="answer" points="455,-84 486,-31 424,-31"/>
    <text class="small" x="455" y="-48" text-anchor="middle" fill="#ffffff">A</text>
  </g>

  <text class="small" x="424" y="544">Find the first true, not any true.</text>
  <text class="small faint" x="681" y="544">This is boundary search.</text>
</svg>
