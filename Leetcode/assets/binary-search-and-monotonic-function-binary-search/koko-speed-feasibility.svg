<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Koko speed feasibility boundary</title>
  <desc id="desc">Candidate eating speeds from one to six showing speeds one through three are not feasible and speeds four through six are feasible.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rule { stroke: #e5e7eb; stroke-width: 2; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .falseCell { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
      .trueCell { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
      .answerCell { fill: #dbeafe; stroke: #38bdf8; stroke-width: 3; }
      .speed { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .status { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .bad { fill: #b91c1c; }
      .good { fill: #15803d; }
      .answer { fill: #0ea5e9; }
      .faint { fill: #6b7280; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="64" y="78">Koko: Minimum Feasible Speed</text>
  <line class="rule" x1="64" y1="106" x2="1136" y2="106"/>
  <text class="body" x="64" y="162">If speed</text>
  <text class="mono" x="167" y="162">k</text>
  <text class="body" x="188" y="162">works, every speed larger than</text>
  <text class="mono" x="533" y="162">k</text>
  <text class="body" x="554" y="162">also works.</text>
  <text class="body" x="64" y="209">So binary search finds the first feasible speed.</text>

  <text class="small" x="415" y="275">piles = [3, 6, 7, 11], hours = 8</text>

  <g transform="translate(210 330)">
    <rect class="falseCell" x="0" y="0" width="130" height="92"/>
    <rect class="falseCell" x="130" y="0" width="130" height="92"/>
    <rect class="falseCell" x="260" y="0" width="130" height="92"/>
    <rect class="answerCell" x="390" y="0" width="130" height="92"/>
    <rect class="trueCell" x="520" y="0" width="130" height="92"/>
    <rect class="trueCell" x="650" y="0" width="130" height="92"/>

    <text class="speed" x="65" y="36" text-anchor="middle">1</text>
    <text class="speed" x="195" y="36" text-anchor="middle">2</text>
    <text class="speed" x="325" y="36" text-anchor="middle">3</text>
    <text class="speed" x="455" y="36" text-anchor="middle">4</text>
    <text class="speed" x="585" y="36" text-anchor="middle">5</text>
    <text class="speed" x="715" y="36" text-anchor="middle">6</text>

    <text class="status bad" x="65" y="70" text-anchor="middle">False</text>
    <text class="status bad" x="195" y="70" text-anchor="middle">False</text>
    <text class="status bad" x="325" y="70" text-anchor="middle">False</text>
    <text class="status good" x="455" y="70" text-anchor="middle">True</text>
    <text class="status good" x="585" y="70" text-anchor="middle">True</text>
    <text class="status good" x="715" y="70" text-anchor="middle">True</text>

    <polygon class="answer" points="455,-78 487,-24 423,-24"/>
    <text class="small" x="455" y="-42" text-anchor="middle" fill="#ffffff">min</text>
  </g>

  <text class="small" x="405" y="537">minimum speed = 4</text>
  <text class="small faint" x="590" y="537">This is the first true candidate.</text>
</svg>
