<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Feasible function template</title>
  <desc id="desc">A diagram showing candidate answers flowing into feasible x, producing false or true values that binary search can use.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rule { stroke: #e5e7eb; stroke-width: 2; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .decision { fill: #fce7f3; stroke: #f472b6; stroke-width: 2; rx: 8; }
      .falseCell { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
      .trueCell { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
      .arrow { stroke: #8b5cf6; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .text { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .bad { fill: #b91c1c; }
      .good { fill: #15803d; }
      .faint { fill: #6b7280; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="64" y="78">Find The Feasible Function</text>
  <line class="rule" x1="64" y1="106" x2="1136" y2="106"/>
  <text class="body" x="64" y="162">Binary search on answer starts by turning each candidate into</text>
  <text class="mono" x="731" y="162">True</text>
  <text class="body" x="797" y="162">or</text>
  <text class="mono" x="831" y="162">False</text>
  <text class="body" x="917" y="162">.</text>

  <g transform="translate(105 270)">
    <rect class="box" x="0" y="0" width="230" height="92"/>
    <text class="text" x="115" y="38" text-anchor="middle">candidate</text>
    <text class="mono" x="115" y="70" text-anchor="middle">mid</text>
  </g>

  <path class="arrow" d="M 345 316 L 455 316" marker-end="url(#arrowhead)"/>

  <g transform="translate(475 270)">
    <rect class="decision" x="0" y="0" width="250" height="92"/>
    <text class="text" x="125" y="38" text-anchor="middle">feasible(mid)</text>
    <text class="small" x="125" y="70" text-anchor="middle">does this candidate work?</text>
  </g>

  <path class="arrow" d="M 745 316 L 855 316" marker-end="url(#arrowhead)"/>

  <g transform="translate(875 246)">
    <rect class="falseCell" x="0" y="0" width="190" height="62"/>
    <rect class="trueCell" x="0" y="82" width="190" height="62"/>
    <text class="text bad" x="95" y="39" text-anchor="middle">False</text>
    <text class="text good" x="95" y="121" text-anchor="middle">True</text>
  </g>

  <text class="small" x="146" y="442">1. Pick answer bounds.</text>
  <text class="small" x="146" y="482">2. Define one yes/no check.</text>
  <text class="small" x="146" y="522">3. Prove the answers are monotonic.</text>
  <text class="small faint" x="552" y="522">Then apply first-true binary search.</text>
</svg>
