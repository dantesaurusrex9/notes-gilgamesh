<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Square root binary search decisions for n equals eight</title>
  <desc id="desc">A binary search trace for n equals eight showing mid four is too large, mid one fits, mid two fits, and mid three is too large.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rule { stroke: #e5e7eb; stroke-width: 2; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .cell { fill: #fbf8ea; stroke: #b8b8aa; stroke-width: 1.5; }
      .fit { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
      .tooBig { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
      .answer { fill: #dbeafe; stroke: #38bdf8; stroke-width: 3; }
      .value { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .bad { fill: #b91c1c; }
      .good { fill: #15803d; }
      .blue { fill: #0ea5e9; }
      .pink { fill: #d63384; }
      .red { fill: #ef3b2d; }
      .arrow { stroke: #8b5cf6; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="64" y="78">Trace: n = 8</text>
  <line class="rule" x1="64" y1="106" x2="1136" y2="106"/>
  <text class="body" x="64" y="162">Compare</text>
  <text class="mono" x="166" y="162">mid * mid</text>
  <text class="body" x="314" y="162">with</text>
  <text class="mono" x="374" y="162">n</text>
  <text class="body" x="397" y="162">to decide which half survives.</text>

  <g transform="translate(195 305)">
    <rect class="fit" x="0" y="0" width="95" height="82"/>
    <rect class="fit" x="95" y="0" width="95" height="82"/>
    <rect class="answer" x="190" y="0" width="95" height="82"/>
    <rect class="tooBig" x="285" y="0" width="95" height="82"/>
    <rect class="tooBig" x="380" y="0" width="95" height="82"/>
    <rect class="tooBig" x="475" y="0" width="95" height="82"/>
    <rect class="tooBig" x="570" y="0" width="95" height="82"/>
    <rect class="tooBig" x="665" y="0" width="95" height="82"/>
    <rect class="tooBig" x="760" y="0" width="95" height="82"/>

    <text class="value" x="47.5" y="34" text-anchor="middle">0</text>
    <text class="value" x="142.5" y="34" text-anchor="middle">1</text>
    <text class="value" x="237.5" y="34" text-anchor="middle">2</text>
    <text class="value" x="332.5" y="34" text-anchor="middle">3</text>
    <text class="value" x="427.5" y="34" text-anchor="middle">4</text>
    <text class="value" x="522.5" y="34" text-anchor="middle">5</text>
    <text class="value" x="617.5" y="34" text-anchor="middle">6</text>
    <text class="value" x="712.5" y="34" text-anchor="middle">7</text>
    <text class="value" x="807.5" y="34" text-anchor="middle">8</text>

    <text class="tiny good" x="142.5" y="67" text-anchor="middle">1 fits</text>
    <text class="tiny good" x="237.5" y="67" text-anchor="middle">4 fits</text>
    <text class="tiny bad" x="332.5" y="67" text-anchor="middle">9 big</text>
    <text class="tiny bad" x="427.5" y="67" text-anchor="middle">16 big</text>

    <polygon class="pink" points="427.5,-76 457,-24 398,-24"/>
    <text class="small" x="427.5" y="-42" text-anchor="middle" fill="#ffffff">M1</text>
    <polygon class="blue" points="237.5,132 208,184 267,184"/>
    <text class="small" x="237.5" y="167" text-anchor="middle" fill="#ffffff">ans</text>
    <polygon class="red" points="332.5,-76 362,-24 303,-24"/>
    <text class="small" x="332.5" y="-42" text-anchor="middle" fill="#ffffff">M4</text>
  </g>

  <path class="arrow" d="M 623 214 C 565 232, 476 242, 428 291" marker-end="url(#arrowhead)"/>
  <text class="small" x="646" y="219">4 squared is too large, search left</text>
  <text class="small" x="392" y="546">2 fits, 3 is too large, so return 2.</text>
</svg>
