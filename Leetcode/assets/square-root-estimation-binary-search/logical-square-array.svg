<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">Logical square root candidate array</title>
  <desc id="desc">Candidate values from zero to five with their squares, showing two is the integer square root for n equals eight.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rule { stroke: #e5e7eb; stroke-width: 2; }
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 25px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .fit { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
      .answer { fill: #dbeafe; stroke: #38bdf8; stroke-width: 3; }
      .tooBig { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
      .value { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .statusGood { fill: #15803d; }
      .statusBad { fill: #b91c1c; }
      .marker { fill: #0ea5e9; }
      .faint { fill: #6b7280; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="64" y="78">Logical Answer Space</text>
  <line class="rule" x1="64" y1="106" x2="1136" y2="106"/>
  <text class="body" x="64" y="162">For</text>
  <text class="mono" x="111" y="162">n = 8</text>
  <text class="body" x="191" y="162">, search possible integer answers directly.</text>
  <text class="body" x="64" y="209">The largest candidate with square at most 8 is the answer.</text>

  <g transform="translate(210 325)">
    <rect class="fit" x="0" y="0" width="130" height="92"/>
    <rect class="fit" x="130" y="0" width="130" height="92"/>
    <rect class="answer" x="260" y="0" width="130" height="92"/>
    <rect class="tooBig" x="390" y="0" width="130" height="92"/>
    <rect class="tooBig" x="520" y="0" width="130" height="92"/>
    <rect class="tooBig" x="650" y="0" width="130" height="92"/>

    <text class="value" x="65" y="34" text-anchor="middle">0</text>
    <text class="value" x="195" y="34" text-anchor="middle">1</text>
    <text class="value" x="325" y="34" text-anchor="middle">2</text>
    <text class="value" x="455" y="34" text-anchor="middle">3</text>
    <text class="value" x="585" y="34" text-anchor="middle">4</text>
    <text class="value" x="715" y="34" text-anchor="middle">5</text>

    <text class="small statusGood" x="65" y="70" text-anchor="middle">0 &lt;= 8</text>
    <text class="small statusGood" x="195" y="70" text-anchor="middle">1 &lt;= 8</text>
    <text class="small statusGood" x="325" y="70" text-anchor="middle">4 &lt;= 8</text>
    <text class="small statusBad" x="455" y="70" text-anchor="middle">9 > 8</text>
    <text class="small statusBad" x="585" y="70" text-anchor="middle">16 > 8</text>
    <text class="small statusBad" x="715" y="70" text-anchor="middle">25 > 8</text>

    <polygon class="marker" points="325,-78 357,-24 293,-24"/>
    <text class="small" x="325" y="-42" text-anchor="middle" fill="#ffffff">ans</text>
  </g>

  <text class="small" x="426" y="538">integer square root = 2</text>
  <text class="small faint" x="655" y="538">No array is allocated.</text>
</svg>
