<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" width="1200" height="620" role="img" aria-labelledby="title desc">
  <title id="title">First true and last false square root boundary</title>
  <desc id="desc">For n equals eight, candidates zero through two are not too large, candidate three is the first too large, and two is the last false answer.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .rule { stroke: #e5e7eb; stroke-width: 2; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .mono { font: 700 24px "SFMono-Regular", Consolas, monospace; fill: #d63384; }
      .small { font: 600 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .tiny { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .falseCell { fill: #dcfce7; stroke: #86efac; stroke-width: 2; }
      .trueCell { fill: #fee2e2; stroke: #fca5a5; stroke-width: 2; }
      .answerCell { fill: #dbeafe; stroke: #38bdf8; stroke-width: 3; }
      .value { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .statusFalse { fill: #15803d; }
      .statusTrue { fill: #b91c1c; }
      .line { stroke: #8b5cf6; stroke-width: 5; stroke-dasharray: 10 10; stroke-linecap: round; }
      .blue { fill: #0ea5e9; }
      .purple { fill: #8b5cf6; }
      .faint { fill: #6b7280; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="620"/>
  <text class="title" x="64" y="78">First Too Large, Last Fitting</text>
  <line class="rule" x1="64" y1="106" x2="1136" y2="106"/>
  <text class="body" x="64" y="162">Use</text>
  <text class="mono" x="115" y="162">mid^2 > n</text>
  <text class="body" x="260" y="162">as a first-true check.</text>
  <text class="body" x="64" y="209">The answer is the last false before the first true.</text>

  <g transform="translate(210 330)">
    <rect class="falseCell" x="0" y="0" width="130" height="92"/>
    <rect class="falseCell" x="130" y="0" width="130" height="92"/>
    <rect class="answerCell" x="260" y="0" width="130" height="92"/>
    <rect class="trueCell" x="390" y="0" width="130" height="92"/>
    <rect class="trueCell" x="520" y="0" width="130" height="92"/>
    <rect class="trueCell" x="650" y="0" width="130" height="92"/>

    <text class="value" x="65" y="34" text-anchor="middle">0</text>
    <text class="value" x="195" y="34" text-anchor="middle">1</text>
    <text class="value" x="325" y="34" text-anchor="middle">2</text>
    <text class="value" x="455" y="34" text-anchor="middle">3</text>
    <text class="value" x="585" y="34" text-anchor="middle">4</text>
    <text class="value" x="715" y="34" text-anchor="middle">5</text>

    <text class="small statusFalse" x="65" y="70" text-anchor="middle">False</text>
    <text class="small statusFalse" x="195" y="70" text-anchor="middle">False</text>
    <text class="small statusFalse" x="325" y="70" text-anchor="middle">False</text>
    <text class="small statusTrue" x="455" y="70" text-anchor="middle">True</text>
    <text class="small statusTrue" x="585" y="70" text-anchor="middle">True</text>
    <text class="small statusTrue" x="715" y="70" text-anchor="middle">True</text>

    <line class="line" x1="390" y1="-48" x2="390" y2="135"/>
    <polygon class="blue" points="325,145 293,199 357,199"/>
    <text class="small" x="325" y="181" text-anchor="middle" fill="#ffffff">ans</text>
    <polygon class="purple" points="455,-82 487,-28 423,-28"/>
    <text class="small" x="455" y="-46" text-anchor="middle" fill="#ffffff">1st T</text>
  </g>

  <text class="small" x="380" y="568">first true is 3, so answer is 3 - 1 = 2</text>
</svg>
